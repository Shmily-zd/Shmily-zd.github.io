<script>

  let sideBarOpen = 'sidebar-open';
  let body = document.body;
  let back2Top = document.querySelector('#back_to_top'),
    back2TopText = document.querySelector('#back_to_top_text'),
    drawerBox = document.querySelector('#drawer_box'),
    rightSideBar = document.querySelector('.sidebar'),
    viewport = document.querySelector('body');

  function scrollAnimation(currentY, targetY) {

    let needScrollTop = targetY - currentY
    let _currentY = currentY
    setTimeout(() => {
      const dist = Math.ceil(needScrollTop / 10)
      _currentY += dist
      window.scrollTo(_currentY, currentY)
      if (needScrollTop > 10 || needScrollTop < -10) {
        scrollAnimation(_currentY, targetY)
      } else {
        window.scrollTo(_currentY, targetY)
      }
    }, 1)
  }

  back2Top.addEventListener("click", function (e) {
    scrollAnimation(document.scrollingElement.scrollTop, 0);
    e.stopPropagation();
    return false;
  });

  window.addEventListener('scroll', function (e) {
    let percent = document.scrollingElement.scrollTop / (document.scrollingElement.scrollHeight - document.scrollingElement.clientHeight) * 100;
    if (percent > 1 && !back2Top.classList.contains('back-top-active')) {
      back2Top.classList.add('back-top-active');
    }
    if (percent == 0) {
      back2Top.classList.remove('back-top-active');
    }
    if (back2TopText) {
      back2TopText.textContent = Math.floor(percent);
    }
  });


  let hasCacu = false;
  window.onresize = function () {
    calcuHeight();
  }

  function calcuHeight() {
    // 动态调整站点概览高度
    if (!hasCacu && back2Top.classList.contains('pisces') || back2Top.classList.contains('gemini')) {
      let sideBar = document.querySelector('.sidebar');
      let navUl = document.querySelector('#site_nav');
      sideBar.style = 'margin-top:' + (navUl.offsetHeight + navUl.offsetTop + 15) + 'px;';
      hasCacu = true;
    }
  }
  calcuHeight();

  let open = false, MOTION_TIME = 300, RIGHT_MOVE_DIS = '320px';

  if (drawerBox) {
    let rightMotions = document.querySelectorAll('.right-motion');
    let right = drawerBox.classList.contains('right');

    let transitionDir = right ? "transition.slideRightIn" : "transition.slideLeftIn";

    let openProp, closeProp;
    if (right) {
      openProp = {
        paddingRight: RIGHT_MOVE_DIS
      };
      closeProp = {
        paddingRight: '0px'
      };
    } else {
      openProp = {
        paddingLeft: RIGHT_MOVE_DIS
      };
      closeProp = {
        paddingLeft: '0px'
      };
    }

    drawerBox.onclick = function () {
      open = !open;
      window.Velocity(rightSideBar, 'stop');
      window.Velocity(viewport, 'stop');
      window.Velocity(rightMotions, 'stop');
      if (open) {
        window.Velocity(rightSideBar, {
          width: RIGHT_MOVE_DIS
        }, {
          duration: MOTION_TIME,
          begin: function () {
            window.Velocity(rightMotions, transitionDir, {});
          }
        })
        window.Velocity(viewport, openProp, {
          duration: MOTION_TIME
        });
      } else {
        window.Velocity(rightSideBar, {
          width: '0px'
        }, {
          duration: MOTION_TIME,
          begin: function () {
            window.Velocity(rightMotions, {
              opacity: 0
            });
          }
        })
        window.Velocity(viewport, closeProp, {
          duration: MOTION_TIME
        });
      }
      for (let i = 0; i < drawerBox.children.length; i++) {
        drawerBox.children[i].classList.toggle('muse-line');
      }
      drawerBox.classList.toggle(sideBarOpen);
    }
  }

  // 链接跳转
  let newWindow = 'true'
  if (newWindow === 'true') {
    let links = document.querySelectorAll('.post-body a')
    links.forEach(item => {
      if (!item.classList.contains('btn')) {
        item.setAttribute("target", "_blank");
      }
    })
  }

  let faSearch = document.querySelector('#fa_search');
  faSearch.addEventListener('click', function () {
    document.querySelector('#search_mask').style = ''
  })

  // 代码高亮
  hljs.initHighlightingOnLoad();
  
  // 离开当前页title变化
  var leaveTitle = "";
  if (leaveTitle) {
    document.addEventListener('visibilitychange', function () {
      if (document.visibilityState == 'hidden') {
        normal_title = document.title;
        document.title = leaveTitle;
      } else {
        document.title = normal_title;
      }
    });
  }

</script>

          &lt;h3 id=&#34;多任务&#34;&gt;&lt;strong&gt;多任务&lt;/strong&gt;&lt;/h3&gt;
&lt;p&gt;多任务：在同一时间内执行多个任务&lt;br&gt;
多任务的目的：多任务的最大好处是&lt;strong&gt;充分利用CPU资源，提高程序的执行效率&lt;/strong&gt;&lt;br&gt;
&lt;code&gt;并发&lt;/code&gt;:在一段时间内&lt;strong&gt;交替&lt;/strong&gt;执行多个任务&lt;br&gt;
&lt;code&gt;并行&lt;/code&gt;:在同一时刻&lt;strong&gt;同时&lt;/strong&gt;执行多个任务&lt;/p&gt;
&lt;h3 id=&#34;多进程多任务的实现方式&#34;&gt;&lt;strong&gt;多进程(多任务的实现方式)&lt;/strong&gt;&lt;/h3&gt;
&lt;p&gt;进程：&lt;kbd&gt;运行&lt;/kbd&gt;中的程序，&lt;strong&gt;分配&lt;/strong&gt;资源的最小单位&lt;br&gt;
线程：&lt;strong&gt;使用&lt;/strong&gt;资源的最小单位&lt;br&gt;
进程和线程的关系：一个程序运行后至少有一个进程，每个进程默认有一个线程&lt;/p&gt;
&lt;h4 id=&#34;多进程的使用流程&#34;&gt;&lt;strong&gt;多进程的使用流程：&lt;/strong&gt;&lt;/h4&gt;
&lt;ol&gt;
&lt;li&gt;
&lt;p&gt;导入进程模块(multiprocessing)&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;import multiprocessing     
&lt;/code&gt;&lt;/pre&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;创建子进程对象&lt;/p&gt;
&lt;pre&gt;&lt;code&gt; sub_process = multiprocessing.Process(group=None, target=None, name=None, args, kwargs)
 # 其中：args 方式传参应注意参数顺序一致，kwargs 传参应注意字典的 key 与参数名一致
&lt;/code&gt;&lt;/pre&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;启动子进程&lt;/p&gt;
&lt;pre&gt;&lt;code&gt; sub_process.start() #启动子进程
 sub_process.join() # 进程等待
 sub_process.terminate() # 终止子进程
 multiprocessing.current_process() #查看当前进程
 os.getpid() # 查看进程编号
 os.getppid() # 查看父进程编号
 os.kill(进程编号，9) # 根据进程编号强制杀死进程
 print(a, b, c) # 可以直接打印变量 a b c

 # 进程的运行是无序的，不依赖代码的先后顺序
&lt;/code&gt;&lt;/pre&gt;
&lt;/li&gt;
&lt;/ol&gt;
&lt;p&gt;实例：&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;# 单进程
import time


def dance():
    for i in range(5):
        time.sleep(1)
        print(&amp;quot;DANCE&amp;quot;, i)


def sing():
    for i in range(5):
        time.sleep(1)
        print(&amp;quot;SING&amp;quot;, i)


if __name__ == &#39;__main__&#39;:
    dance()
    sing()

［运行结果］
[Done] exited with code=0 in 10.052 seconds
&lt;/code&gt;&lt;/pre&gt;
&lt;hr&gt;
&lt;pre&gt;&lt;code&gt;# 多进程
import time

# 导入进程模块
import multiprocessing


def dance():
    for i in range(5):
        time.sleep(1)
        print(&amp;quot;DANCE&amp;quot;, i)


def sing():
    for i in range(5):
        time.sleep(1)
        print(&amp;quot;SING&amp;quot;, i)


if __name__ == &#39;__main__&#39;:
    # 创建子进程
    my_dance = multiprocessing.Process(target=dance)
    my_sing = multiprocessing.Process(target=sing)

    # 启动子进程
    my_dance.start()
    my_sing.start()

［运行结果］
[Done] exited with code=0 in 5.095 seconds
&lt;/code&gt;&lt;/pre&gt;
&lt;h4 id=&#34;进程idos模块&#34;&gt;&lt;strong&gt;进程ID(os模块)&lt;/strong&gt;&lt;/h4&gt;
&lt;p&gt;目的: 知道子进程是由哪个主进程创建的(子进程需要主进程回收资源)&lt;br&gt;
​	&lt;code&gt;os.getpid()&lt;/code&gt;: 表示获取当前进程编号&lt;br&gt;
​	&lt;code&gt;os.getppid()&lt;/code&gt;: 表示获取当前父进程编号&lt;/p&gt;
&lt;h4 id=&#34;进程名字&#34;&gt;&lt;strong&gt;进程名字&lt;/strong&gt;&lt;/h4&gt;
&lt;ol&gt;
&lt;li&gt;
&lt;p&gt;进程起名字&lt;/p&gt;
&lt;pre&gt;&lt;code&gt; my_dance = multiprocessing.Process(target=dance, name=&amp;quot;my_ProcessName&amp;quot;)
&lt;/code&gt;&lt;/pre&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;获取进程的名字&lt;/p&gt;
&lt;pre&gt;&lt;code&gt; multiprocessing.current_process()

 # 运行结果
 &amp;lt;Process name=&#39;my_ProcessName&#39; parent=151225 started&amp;gt;
&lt;/code&gt;&lt;/pre&gt;
&lt;/li&gt;
&lt;/ol&gt;
&lt;h4 id=&#34;进程参数&#34;&gt;&lt;strong&gt;进程参数&lt;/strong&gt;&lt;/h4&gt;
&lt;pre&gt;&lt;code&gt;带有参数的函数:
args: 元组!!!(单个元素的元组有 , )
my_dance = multiprocessing.Process(target=dance, args=(5,))
	
kwargs: 字典!!!(key值要和函数中的形参完全重名)
my_dance = multiprocessing.Process(target=dance, kwargs={&amp;quot;count&amp;quot;: 5})
&lt;/code&gt;&lt;/pre&gt;
&lt;h4 id=&#34;进程之间不共享全局变量&#34;&gt;&lt;strong&gt;进程之间不共享全局变量&lt;/strong&gt;&lt;/h4&gt;
&lt;p&gt;进程之间不共享全局变量，是因为操作的不是同一个进程里面的全局变量，只不过不同进程里面的全局变量名字相同而已&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;import multiprocessing
import time

# 全局变量列表
g_num = []

def my_write(): # 向全局变量g_num里写入数据
    global g_num
    for i in range(5):
        g_num.append(i)
    print(&amp;quot;my_write:&amp;quot;, g_num)


def my_read(): #读取全局变量g_num的值
    global g_num
    print(&amp;quot;my_read:&amp;quot;, g_num)


if __name__ == &#39;__main__&#39;:
    sub_write = multiprocessing.Process(target=my_write)
    sub_read = multiprocessing.Process(target=my_read)

    sub_write.start()
    time.sleep(1) # 保证数据写入g_num中
    sub_read.start()

［运行结果］
my_write: [0, 1, 2, 3, 4]
my_read: []
&lt;/code&gt;&lt;/pre&gt;
&lt;h4 id=&#34;守护主进程or销毁子进程&#34;&gt;&lt;strong&gt;守护主进程or销毁子进程&lt;/strong&gt;&lt;/h4&gt;
&lt;p&gt;为了保证子进程能够正常的运行，主进程会等所有的子进程执行完成以后再销毁&lt;br&gt;
设置守护主进程或销毁主进程的目的是&lt;strong&gt;主进程退出子进程销毁，不让主进程再等待子进程去执行&lt;/strong&gt;&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;设置守护主进程： 子进程对象.daemon = True&lt;/li&gt;
&lt;li&gt;销毁子进程： 子进程对象.terminate()&lt;/li&gt;
&lt;/ul&gt;
&lt;h3 id=&#34;多线程多任务的实现方式&#34;&gt;&lt;strong&gt;多线程(多任务的实现方式)&lt;/strong&gt;&lt;/h3&gt;
&lt;h4 id=&#34;多线程使用流程&#34;&gt;&lt;strong&gt;多线程使用流程&lt;/strong&gt;&lt;/h4&gt;
&lt;ol&gt;
&lt;li&gt;导入线程模块(threading)&lt;/li&gt;
&lt;li&gt;创建子线程&lt;/li&gt;
&lt;li&gt;开始子线程&lt;/li&gt;
&lt;/ol&gt;
&lt;p&gt;实例&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;import time

# 导入线程模块
import threading


def dance():
    for i in range(5):
        time.sleep(1)
        print(&amp;quot;DANCE&amp;quot;, i)


def sing():
    for i in range(5):
        time.sleep(1)
        print(&amp;quot;SING&amp;quot;, i)


if __name__ == &#39;__main__&#39;:
    # 创建子进程
    my_dance = threading.Thread(target=dance)
    my_sing = threading.Thread(target=sing)

    # 启动子进程
    my_dance.start()
    my_sing.start()

［运行结果］
[Done] exited with code=0 in 5.042 seconds
&lt;/code&gt;&lt;/pre&gt;
&lt;h4 id=&#34;线程之间是无序执行的&#34;&gt;&lt;strong&gt;线程之间是无序执行的&lt;/strong&gt;&lt;/h4&gt;
&lt;h4 id=&#34;守护主线程&#34;&gt;&lt;strong&gt;守护主线程&lt;/strong&gt;   ​&lt;/h4&gt;
&lt;p&gt;主线程会等待子线程的结束而结束&lt;br&gt;
设置守护主线程的两种方式：&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;threading.Thread(target=show_info, daemon=True)&lt;/li&gt;
&lt;li&gt;线程对象.setDaemon(True)&lt;/li&gt;
&lt;/ul&gt;
&lt;h4 id=&#34;线程参数同进程&#34;&gt;&lt;strong&gt;线程参数(同进程)&lt;/strong&gt;&lt;/h4&gt;
&lt;h4 id=&#34;线程之间共享全局变量&#34;&gt;&lt;strong&gt;线程之间共享全局变量&lt;/strong&gt;&lt;/h4&gt;
&lt;p&gt;好处是可以对全局变量的数据进行共享&lt;br&gt;
但是可能会导致数据出现错误问题&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;import threading
import time

g_num = []


def my_write():
    global g_num
    for i in range(5):
        g_num.append(i)
    print(&amp;quot;my_write:&amp;quot;, g_num)


def my_read():
    global g_num
    print(&amp;quot;my_read:&amp;quot;, g_num)


if __name__ == &#39;__main__&#39;:
    sub_write = threading.Thread(target=my_write)
    sub_read = threading.Thread(target=my_read)

    sub_write.start()
    time.sleep(1)
    sub_read.start()

［运行结果］
my_write: [0, 1, 2, 3, 4]
my_read: [0, 1, 2, 3, 4]
&lt;/code&gt;&lt;/pre&gt;
&lt;h4 id=&#34;线程之间共享全局变量的问题&#34;&gt;&lt;strong&gt;线程之间共享全局变量的问题&lt;/strong&gt;&lt;/h4&gt;
&lt;p&gt;线程同步: 保证同一时刻只能有一个线程去操作全局变量 同步: 就是协同步调，按预定的先后次序进行运行。&lt;br&gt;
线程同步的方式:&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;
&lt;p&gt;线程等待(join)&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;  first_thread.start()
  first_thread.join() # 等待线程first_thread执行完毕再继续向下进行
  second_thread.start()    
&lt;/code&gt;&lt;/pre&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;互斥锁&lt;br&gt;
对共享数据进行锁定，保证同一时刻只能有一个线程去操作&lt;br&gt;
互斥锁的使用：&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;创建锁:&lt;code&gt;mutex = threading.Lock()&lt;/code&gt;&lt;/li&gt;
&lt;li&gt;上锁:&lt;code&gt;mutex.acquire()&lt;/code&gt;&lt;/li&gt;
&lt;li&gt;释放锁:&lt;code&gt;mutex.release()&lt;/code&gt;&lt;br&gt;
注意避免死锁，在合适位置释放锁&lt;/li&gt;
&lt;/ul&gt;
&lt;/li&gt;
&lt;/ul&gt;
">python_多任务</a>
      </div>
      
      <div class="item">
        <a class="result-title" style="opacity: 0;" href="https://zdblog.top/post/python_-ming-ming-gui-fan-_-ji-yu-pep-8/"" data-c="
          &lt;p&gt;Python库的命名规范很乱，从来没能做到完全一致。但是目前有一些推荐的命名标准。新的模块和包（包括第三方框架）应该用这套标准，但当一个已有库采用了不同的风格，推荐保持内部一致性。&lt;/p&gt;
&lt;h2 id=&#34;overriding-principle-最重要的原则&#34;&gt;Overriding Principle 最重要的原则&lt;/h2&gt;
&lt;p&gt;那些暴露给用户的API接口的命名，应该遵循反映使用场景而不是实现的原则。&lt;/p&gt;
&lt;h2 id=&#34;descriptive-naming-styles-描述命名风格&#34;&gt;Descriptive: Naming Styles 描述：命名风格&lt;/h2&gt;
&lt;p&gt;有许多不同的命名风格。这里能够帮助大家识别正在使用什么样的命名风格，而不考虑他们为什么使用。&lt;br&gt;
以下是常见的命名方式：&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;
&lt;p&gt;&lt;code&gt;b&lt;/code&gt;（单个小写字母）&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;&lt;code&gt;B&lt;/code&gt;（单个大写字母）&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;&lt;code&gt;lowercase&lt;/code&gt; 小写字母&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;&lt;code&gt;lower_case_with_underscores&lt;/code&gt; 使用下划线分隔的小写字母&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;&lt;code&gt;UPPERCASE&lt;/code&gt; 大写字母&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;&lt;code&gt;UPPER_CASE_WITH_UNDERSCORES&lt;/code&gt; 使用下划线分隔的大写字母&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;&lt;code&gt;CapitalizedWords&lt;/code&gt;（或者叫 &lt;code&gt;CapWords&lt;/code&gt;，或者叫&lt;code&gt;CamelCase&lt;/code&gt; 驼峰命名法 —— 这么命名是因为字母看上去有起伏的外观&lt;a href=&#34;https://blog.csdn.net/ratsniper/article/details/78954852#fn:4&#34; title=&#34;See footnote&#34;&gt;5&lt;/a&gt;）。有时候也被称为StudlyCaps。&lt;br&gt;
注意：当在首字母大写的风格中用到缩写时，所有缩写的字母用大写，因此，&lt;code&gt;HTTPServerError&lt;/code&gt; 比 &lt;code&gt;HttpServerError&lt;/code&gt; 好。&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;&lt;code&gt;mixedCase&lt;/code&gt;（不同于首字母大写，第一个单词的首字母小写）&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;&lt;code&gt;Capitalized_Words_With_Underscores&lt;/code&gt;（巨丑无比！）&lt;/p&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;p&gt;也有用唯一的短前缀把相关命名组织在一起的方法。这在Python中不常用，但还是提一下。比如，&lt;code&gt;os.stat()&lt;/code&gt;函数中包含类似以&lt;code&gt;st\_mode&lt;/code&gt;，&lt;code&gt;st\_size&lt;/code&gt;，&lt;code&gt;st_mtime&lt;/code&gt;这种传统命名方式命名的变量。（这么做是为了与 POSIX 系统的调用一致，以帮助程序员熟悉它。）&lt;br&gt;
X11库的所有公共函数都加了前缀X。在Python里面没必要这么做，因为属性和方法在调用的时候都会用类名做前缀，函数名用模块名做前缀。&lt;br&gt;
另外，下面这种用前缀或结尾下划线的特殊格式是被认可的（通常和一些约定相结合）：&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;
&lt;p&gt;&lt;code&gt;_single_leading_underscore&lt;/code&gt;：（单下划线开头）弱“内部使用”指示器。比如 from M import * 是不会导入以下划线开始的对象的。&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;&lt;code&gt;single_trailing_underscore_&lt;/code&gt;：（单下划线结尾）这是避免和Python内部关键词冲突的一种约定，比如：&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;tkinter.Toplevel(master, class_=’ClassName’)
&lt;/code&gt;&lt;/pre&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;&lt;code&gt;__double_leading_underscore&lt;/code&gt;：（双下划线开头）当这样命名一个类的属性时，调用它的时候名字会做矫正（在类FooBar中，&lt;code&gt;__boo&lt;/code&gt;变成了&lt;code&gt;_FooBar__boo&lt;/code&gt;；见下文）。&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;&lt;code&gt;__double_leading_and_trailing_underscore__&lt;/code&gt;：（双下划线开头，双下划线结尾）“magic”对象或者存在于用户控制的命名空间内的属性，例如：&lt;code&gt;__init__&lt;/code&gt;,&lt;code&gt;__import__&lt;/code&gt;或者&lt;code&gt;__file__&lt;/code&gt;。除了作为文档之外，永远不要命这样的名。&lt;/p&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;h2 id=&#34;prescriptive-naming-conventions-约定俗成命名约定&#34;&gt;Prescriptive: Naming Conventions 约定俗成：命名约定&lt;/h2&gt;
&lt;h3 id=&#34;names-to-avoid-应避免的名字&#34;&gt;Names to Avoid 应避免的名字&lt;/h3&gt;
&lt;p&gt;永远不要使用字母&lt;code&gt;l&lt;/code&gt;（小写的L），&lt;code&gt;O&lt;/code&gt;（大写的O），或者&lt;code&gt;I&lt;/code&gt;（大写的I）作为单字符变量名。&lt;br&gt;
在有些字体里，这些字符无法和数字&lt;code&gt;0&lt;/code&gt;和&lt;code&gt;1&lt;/code&gt;区分，如果想用&lt;code&gt;l&lt;/code&gt;，用&lt;code&gt;L&lt;/code&gt;代替。&lt;/p&gt;
&lt;h3 id=&#34;package-and-module-names-包名和模块名&#34;&gt;Package and Module Names 包名和模块名&lt;/h3&gt;
&lt;p&gt;模块应该用简短全小写的名字，如果为了提升可读性，下划线也是可以用的。Python包名也应该使用简短全小写的名字，但不建议用下划线。&lt;br&gt;
当使用C或者C++编写了一个依赖于提供高级（更面向对象）接口的Python模块的扩展模块，这个C/C++模块需要一个下划线前缀（例如：&lt;code&gt;_socket&lt;/code&gt;）&lt;/p&gt;
&lt;h3 id=&#34;class-names-类名&#34;&gt;Class Names 类名&lt;/h3&gt;
&lt;p&gt;类名一般使用首字母大写的约定。&lt;br&gt;
在接口被文档化并且主要被用于调用的情况下，可以使用函数的命名风格代替。&lt;br&gt;
注意，对于内置的变量命名有一个单独的约定：大部分内置变量是单个单词（或者两个单词连接在一起），首字母大写的命名法只用于异常名或者内部的常量。&lt;/p&gt;
&lt;h3 id=&#34;type-variable-names-类型变量名&#34;&gt;Type Variable Names 类型变量名&lt;/h3&gt;
&lt;p&gt;在&lt;a href=&#34;https://www.python.org/dev/peps/pep-0484&#34;&gt;PEP 484中&lt;/a&gt;引入的类型变量的名称通常应使用CapWords，而应使用短名称：T，AnyStr，Num。建议将后缀_co或_contra添加到用于分别声明协变或反变行为的变量中：&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;from typing import TypeVar

VT_co = TypeVar(&#39;VT_co&#39;, covariant=True)
KT_contra = TypeVar(&#39;KT_contra&#39;, contravariant=True)
&lt;/code&gt;&lt;/pre&gt;
&lt;h3 id=&#34;exception-names-异常名&#34;&gt;Exception Names 异常名&lt;/h3&gt;
&lt;p&gt;因为异常一般都是类，所有类的命名方法在这里也适用。然而，你需要在异常名后面加上&lt;code&gt;Error&lt;/code&gt;后缀（如果异常确实是一个错误）。&lt;/p&gt;
&lt;h3 id=&#34;global-variable-names-全局变量名&#34;&gt;Global Variable Names 全局变量名&lt;/h3&gt;
&lt;p&gt;（我们希望这一类变量只在模块内部使用。）约定和函数命名规则一样。&lt;br&gt;
通过&lt;code&gt;from M import *&lt;/code&gt;导入的模块应该使用all机制去防止内部的接口对外暴露，或者使用在全局变量前加下划线的方式（表明这些全局变量是模块内非公有）。&lt;/p&gt;
&lt;h3 id=&#34;function-names-函数名&#34;&gt;Function Names 函数名&lt;/h3&gt;
&lt;p&gt;函数名应该小写，如果想提高可读性可以用下划线分隔。&lt;br&gt;
大小写混合仅在为了兼容原来主要以大小写混合风格的情况下使用（比如 &lt;code&gt;threading.py&lt;/code&gt;），保持向后兼容性。&lt;/p&gt;
&lt;h3 id=&#34;function-and-method-arguments-函数和方法参数&#34;&gt;Function and method arguments 函数和方法参数&lt;/h3&gt;
&lt;p&gt;始终要将 &lt;code&gt;self&lt;/code&gt;作为实例方法的的第一个参数。&lt;br&gt;
始终要将&lt;code&gt;cls&lt;/code&gt;作为类静态方法的第一个参数。&lt;br&gt;
如果函数的参数名和已有的关键词冲突，在最后加单一下划线比缩写或随意拼写更好。因此&lt;code&gt;class_&lt;/code&gt;比&lt;code&gt;clss&lt;/code&gt;更好。（也许最好用同义词来避免这种冲突）&lt;/p&gt;
&lt;h3 id=&#34;method-names-and-instance-variables-方法名和实例变量&#34;&gt;Method Names and Instance Variables 方法名和实例变量&lt;/h3&gt;
&lt;p&gt;遵循这样的函数命名规则：使用下划线分隔小写单词以提高可读性。&lt;br&gt;
在非共有方法和实例变量前使用单下划线。&lt;br&gt;
通过双下划线前缀触发Python的命名转换规则来避免和子类的命名冲突。&lt;br&gt;
Python通过类名对这些命名进行转换：如果类 &lt;code&gt;Foo&lt;/code&gt;有一个叫 &lt;code&gt;__a&lt;/code&gt; 的成员变量， 它无法通过 &lt;code&gt;Foo.__a&lt;/code&gt; 访问。（执着的用户可以通过 &lt;code&gt;Foo._Foo__a&lt;/code&gt; 访问。）一般来说，前缀双下划线用来避免类中的属性命名与子类冲突的情况。&lt;br&gt;
注意：关于&lt;code&gt;__names&lt;/code&gt;的用法存在争论（见下文）。&lt;/p&gt;
&lt;h3 id=&#34;constants-常量&#34;&gt;Constants 常量&lt;/h3&gt;
&lt;p&gt;常量通常定义在模块级，通过下划线分隔的全大写字母命名。例如： &lt;code&gt;MAX_OVERFLOW&lt;/code&gt; 和 &lt;code&gt;TOTAL&lt;/code&gt;。&lt;/p&gt;
&lt;h3 id=&#34;designing-for-inheritance-继承的设计&#34;&gt;Designing for inheritance 继承的设计&lt;/h3&gt;
&lt;p&gt;始终要考虑到一个类的方法和实例变量（统称：属性）应该是共有还是非共有。如果存在疑问，那就选非共有；因为将一个非共有变量转为共有比反过来更容易。&lt;br&gt;
公共属性是那些与类无关的客户使用的属性，并承诺避免向后不兼容的更改。非共有属性是那些不打算让第三方使用的属性；你不需要承诺非共有属性不会被修改或被删除。&lt;br&gt;
我们不使用“私有（&lt;code&gt;private&lt;/code&gt;）”这个说法，是因为在Python中目前还没有真正的私有属性（为了避免大量不必要的常规工作）。&lt;br&gt;
另一种属性作为子类API的一部分（在其他语言中通常被称为“protected”）。有些类是专为继承设计的，用来扩展或者修改类的一部分行为。当设计这样的类时，要谨慎决定哪些属性时公开的，哪些是作为子类的API，哪些只能在基类中使用。&lt;br&gt;
贯彻这样的思想，一下是一些让代码&lt;code&gt;Pythonic&lt;/code&gt;的准则：&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;
&lt;p&gt;公共属性不应该有前缀下划线。&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;如果公共属性名和关键字冲突，在属性名之后增加一个下划线。这比缩写和随意拼写好很多。（然而，尽管有这样的规则，在作为参数或者变量时，&lt;code&gt;cls&lt;/code&gt;是表示&lt;code&gt;类&lt;/code&gt;最好的选择，特别是作为类方法的第一个参数。）&lt;br&gt;
注意1：参考之前的类方法参数命名建议&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;对于单一的共有属性数据，最好直接对外暴露它的变量名，而不是通过负责的 存取器（&lt;code&gt;accessor&lt;/code&gt;）/突变（&lt;code&gt;mutator&lt;/code&gt;） 方法。请记住，如果你发现一个简单的属性需要成长为一个功能行为，那么Python为这种将来会出现的扩展提供了一个简单的途径。在这种情况下，使用属性去隐藏属性数据访问背后的逻辑。&lt;br&gt;
注意1：属性只在&lt;code&gt;new-style&lt;/code&gt;类中起作用。&lt;br&gt;
注意2：尽管功能方法对于类似缓存的负面影响比较小，但还是要尽量避免。&lt;br&gt;
注意3：属性标记会让调用者认为开销（相当的）小，避免用属性做开销大的计算。&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;如果你的类打算用来继承的话，并且这个类里有不希望子类使用的属性，就要考虑使用双下划线前缀并且没有后缀下划线的命名方式。这会调用Python的命名转换算法，将类的名字加入到属性名里。这样做可以帮助避免在子类中不小心包含了相同的属性名而产生的冲突。&lt;br&gt;
注意1：只有类名才会整合进属性名，如果子类的属性名和类名和父类都相同，那么你还是会有命名冲突的问题。&lt;br&gt;
注意2：命名转换会在某些场景使用起来不太方便，例如调试，&lt;code&gt;__getattr__()&lt;/code&gt;。然而命名转换的算法有很好的文档说明并且很好操作。&lt;br&gt;
注意3：不是所有人都喜欢命名转换。尽量避免意外的名字冲突和潜在的高级调用。&lt;/p&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;h2 id=&#34;public-and-internal-interfaces-公共和内部的接口&#34;&gt;Public and internal interfaces 公共和内部的接口&lt;/h2&gt;
&lt;p&gt;任何向后兼容保证只适用于公共接口，因此，用户清晰地区分公共接口和内部接口非常重要。&lt;br&gt;
文档化的接口被认为是公开的，除非文档明确声明它们是临时或内部接口，不受通常的向后兼容性保证。所有未记录的接口都应该是内部的。&lt;br&gt;
为了更好地支持内省（&lt;code&gt;introspection&lt;/code&gt;），模块应该使用&lt;code&gt;__all__&lt;/code&gt;属性显式地在它们的公共API中声明名称。将&lt;code&gt;__all__&lt;/code&gt;设置为空列表表示模块没有公共API。&lt;br&gt;
即使通过&lt;code&gt;__all__&lt;/code&gt;设置过，内部接口（包，模块，类，方法，属性或其他名字）依然需要单个下划线前缀。&lt;br&gt;
如果一个命名空间（包，模块，类）被认为是内部的，那么包含它的接口也应该被认为是内部的。&lt;br&gt;
导入的名称应该始终被视作是一个实现的细节。其他模块必须不能间接访问这样的名称，除非它是包含它的模块中有明确的文档说明的API，例如 os.path 或者是一个包里从子模块公开函数接口的 &lt;code&gt;__init__&lt;/code&gt; 模块。&lt;/p&gt;
">python_命名规范_基于PEP-8</a>
      </div>
      
      <div class="item">
        <a class="result-title" style="opacity: 0;" href="https://zdblog.top/post/pyhon_-feng-ge-gui-fan-_google/"" data-c="
          &lt;h2 id=&#34;分号&#34;&gt;分号&lt;/h2&gt;
&lt;p&gt;tip&lt;br&gt;
不要在行尾加分号, 也不要用分号将两条命令放在同一行.&lt;/p&gt;
&lt;h2 id=&#34;行长度&#34;&gt;行长度&lt;/h2&gt;
&lt;p&gt;tip&lt;br&gt;
每行不超过80个字符&lt;/p&gt;
&lt;p&gt;例外:&lt;/p&gt;
&lt;ol&gt;
&lt;li&gt;长的导入模块语句&lt;/li&gt;
&lt;li&gt;注释里的URL,路径以及其他的一些长标记&lt;/li&gt;
&lt;li&gt;不便于换行，不包含空格的模块级字符串常量，比如url或者路径&lt;/li&gt;
&lt;li&gt;Pylint 禁用注释.（例如：`# pylint: disable=invalid-name）&lt;/li&gt;
&lt;/ol&gt;
&lt;p&gt;除非是在 &lt;code&gt;with&lt;/code&gt; 语句需要三个以上的上下文管理器的情况下，否则不要使用反斜杠连接行.&lt;/p&gt;
&lt;p&gt;Python会将 &lt;a href=&#34;http://docs.python.org/2/reference/lexical_analysis.html#implicit-line-joining&#34;&gt;圆括号, 中括号和花括号中的行隐式的连接起来&lt;/a&gt;, 你可以利用这个特点. 如果需要, 你可以在表达式外围增加一对额外的圆括号.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;Yes: foo_bar(self, width, height, color=&#39;black&#39;, design=None, x=&#39;foo&#39;,
             emphasis=None, highlight=0)

     if (width == 0 and height == 0 and
         color == &#39;red&#39; and emphasis == &#39;strong&#39;):    
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;如果一个文本字符串在一行放不下, 可以使用圆括号来实现隐式行连接:&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;x = (&#39;This will build a very long long &#39;
     &#39;long long long long long long string&#39;)
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;在注释中，如果必要，将长的URL放在一行上。&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;Yes:  # See details at
# http://www.example.com/us/developer/documentation/api/content/v2.0/csv_file_name_extension_full_specification.html


No:  # See details at
# http://www.example.com/us/developer/documentation/api/content/\
# v2.0/csv_file_name_extension_full_specification.html     
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;当 &lt;code&gt;with&lt;/code&gt; 表达式需要使用三个及其以上的上下文管理器时，可以使用反斜杠换行.若只需要两个，请使用嵌套的with.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;Yes:  with very_long_first_expression_function() as spam, \
           very_long_second_expression_function() as beans, \
           third_thing() as eggs:
          place_order(eggs, beans, spam, beans)


No:  with VeryLongFirstExpressionFunction() as spam, \
          VeryLongSecondExpressionFunction() as beans:
       PlaceOrder(eggs, beans, spam, beans)


Yes:  with very_long_first_expression_function() as spam:
          with very_long_second_expression_function() as beans:
              place_order(beans, spam)
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;注意上面例子中的元素缩进; 你可以在本文的 &lt;a href=&#34;https://github.com/zh-google-styleguide/zh-google-styleguide/blob/master/google-python-styleguide/python_style_rules.rst#id6&#34;&gt;缩进(indentation)&lt;/a&gt;部分找到解释.&lt;/p&gt;
&lt;p&gt;*另外在其他所有情况下，若一行超过80个字符，但 &lt;a href=&#34;https://github.com/google/yapf/&#34;&gt;yapf&lt;/a&gt;却无法将该行字数降至80个字符以下时，则允许该行超过80个字符长度.&lt;/p&gt;
&lt;h2 id=&#34;括号&#34;&gt;括号&lt;/h2&gt;
&lt;p&gt;tip&lt;br&gt;
宁缺毋滥的使用括号&lt;/p&gt;
&lt;p&gt;除非是用于实现行连接, 否则不要在返回语句或条件语句中使用括号. 不过在元组两边使用括号是可以的.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;Yes: if foo: 
         bar()
       while x:
           x = bar()
       if x and y:
           bar()
       if not x:
           bar()
# For a 1 item tuple the ()s are more visually obvious than the comma.
       onesie = (foo,)
       return foo
       return spam, beans
       return (spam, beans)
       for (x, y) in dict.items(): ...

   
No:  if (x):
         bar()
     if not(x):
         bar()
     return (foo)
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;缩进&#34;&gt;缩进&lt;/h2&gt;
&lt;p&gt;tip&lt;br&gt;
用4个空格来缩进代码&lt;/p&gt;
&lt;p&gt;绝对不要用tab, 也不要tab和空格混用. 对于行连接的情况, 你应该要么垂直对齐换行的元素(见 :ref:&lt;code&gt;行长度](line_length*&lt;/code&gt; 部分的示例), 或者使用4空格的悬挂式缩进(这时第一行不应该有参数):&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;Yes:   # Aligned with opening delimiter
      foo = long_function_name(var_one, var_two,
                               var_three, var_four)

       # Aligned with opening delimiter in a dictionary
      foo = {
          long_dictionary_key: value1 +
                               value2,
          ...
      }

       # 4-space hanging indent; nothing on first line
      foo = long_function_name(
          var_one, var_two, var_three,
          var_four)

       # 4-space hanging indent in a dictionary
      foo = {
          long_dictionary_key:
              long_dictionary_value,
          ...
      }
       

No:    # Stuff on first line forbidden
      foo = long_function_name(var_one, var_two,
          var_three, var_four)

       # 2-space hanging indent forbidden
      foo = long_function_name(
        var_one, var_two, var_three,
        var_four)

       # No hanging indent in a dictionary
      foo = {
          long_dictionary_key:
              long_dictionary_value,
              ...
      }
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;序列元素尾部逗号&#34;&gt;序列元素尾部逗号&lt;/h2&gt;
&lt;p&gt;tip&lt;br&gt;
仅当 &lt;code&gt;]&lt;/code&gt;, &lt;code&gt;)&lt;/code&gt;, &lt;code&gt;}&lt;/code&gt; 和末位元素不在同一行时，推荐使用序列元素尾部逗号. 当末位元素尾部有逗号时，元素后的逗号可以指示 &lt;a href=&#34;https://pypi.org/project/yapf/&#34;&gt;YAPF&lt;/a&gt;将序列格式化为每行一项.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;Yes:   golomb3 = [0, 1, 3]
Yes:   golomb4 = [
           0,
           1,
           4,
           6,
       ]


No:    golomb4 = [
           0,
           1,
           4,
           6
       ]
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;空行&#34;&gt;空行&lt;/h2&gt;
&lt;p&gt;tip&lt;br&gt;
顶级定义之间空两行, 方法定义之间空一行&lt;/p&gt;
&lt;p&gt;顶级定义之间空两行, 比如函数或者类定义. 方法定义, 类定义与第一个方法之间, 都应该空一行. 函数或方法中, 某些地方要是你觉得合适, 就空一行.&lt;/p&gt;
&lt;h2 id=&#34;空格&#34;&gt;空格&lt;/h2&gt;
&lt;p&gt;tip&lt;br&gt;
按照标准的排版规范来使用标点两边的空格&lt;/p&gt;
&lt;p&gt;括号内不要有空格.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;Yes: spam(ham[1], {eggs: 2}, [])


No:  spam( ham[ 1 ], { eggs: 2 }, [ ] )
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;不要在逗号, 分号, 冒号前面加空格, 但应该在它们后面加(除了在行尾).&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;Yes: if x == 4:
         print(x, y)
     x, y = y, x
 

No:  if x == 4 :
         print(x , y)
     x , y = y , x
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;参数列表, 索引或切片的左括号前不应加空格.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;Yes: spam(1)

     
no: spam (1)
  

Yes: dict[&#39;key&#39;] = list[index]
  

No:  dict [&#39;key&#39;] = list [index]       
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;在二元操作符两边都加上一个空格, 比如赋值(=), 比较(==,](, &lt;em&gt;, !=,](&lt;/em&gt;,](=, *=, in, not in, is, is not), 布尔(and, or, not).  至于算术操作符两边的空格该如何使用, 需要你自己好好判断. 不过两侧务必要保持一致.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;Yes: x == 1


No:  x&amp;lt;1
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;当 &lt;code&gt;=&lt;/code&gt; 用于指示关键字参数或默认参数值时, 不要在其两侧使用空格. 但若存在类型注释的时候,需要在 &lt;code&gt;=&lt;/code&gt; 周围使用空格.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;Yes: def complex(real, imag=0.0): return magic(r=real, i=imag)
Yes: def complex(real, imag: float = 0.0): return Magic(r=real, i=imag)



No:  def complex(real, imag = 0.0): return magic(r = real, i = imag)
No:  def complex(real, imag: float=0.0): return Magic(r = real, i = imag)
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;不要用空格来垂直对齐多行间的标记, 因为这会成为维护的负担(适用于:, #, =等):&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;Yes:
     foo = 1000  # comment
     long_name = 2  # comment that should not be aligned

     dictionary = {
         &amp;quot;foo&amp;quot;: 1,
         &amp;quot;long_name&amp;quot;: 2,
         }
  

No:
     foo       = 1000  # comment
     long_name = 2     # comment that should not be aligned

     dictionary = {
         &amp;quot;foo&amp;quot;      : 1,
         &amp;quot;long_name&amp;quot;: 2,
         }
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;shebang&#34;&gt;Shebang&lt;/h2&gt;
&lt;p&gt;tip&lt;br&gt;
大部分.py文件不必以#!作为文件的开始. 根据 &lt;a href=&#34;http://www.python.org/dev/peps/pep-0394/&#34;&gt;PEP-394&lt;/a&gt;, 程序的main文件应该以 &lt;code&gt;#!/usr/bin/python2&lt;/code&gt; 或者 &lt;code&gt;#!/usr/bin/python3&lt;/code&gt; 开始.&lt;/p&gt;
&lt;p&gt;(译者注: 在计算机科学中, &lt;a href=&#34;http://en.wikipedia.org/wiki/Shebang_(Unix)&#34;&gt;Shebang&lt;/a&gt;(也称为Hashbang)是一个由井号和叹号构成的字符串行(#!), 其出现在文本文件的第一行的前两个字符. 在文件中存在Shebang的情况下, 类Unix操作系统的程序载入器会分析Shebang后的内容, 将这些内容作为解释器指令, 并调用该指令, 并将载有Shebang的文件路径作为该解释器的参数. 例如, 以指令#!/bin/sh开头的文件在执行时会实际调用/bin/sh程序.)&lt;/p&gt;
&lt;p&gt;&lt;code&gt;#!&lt;/code&gt; 先用于帮助内核找到Python解释器, 但是在导入模块时, 将会被忽略. 因此只有被直接执行的文件中才有必要加入 &lt;code&gt;#!&lt;/code&gt; .&lt;/p&gt;
&lt;h2 id=&#34;注释&#34;&gt;注释&lt;/h2&gt;
&lt;p&gt;tip&lt;br&gt;
确保对模块, 函数, 方法和行内注释使用正确的风格&lt;/p&gt;
&lt;p&gt;&lt;strong&gt;文档字符串&lt;/strong&gt;&lt;/p&gt;
&lt;p&gt;Python有一种独一无二的的注释方式: 使用文档字符串. 文档字符串是包, 模块, 类或函数里的第一个语句. 这些字符串可以通过对象的 &lt;code&gt;__doc__&lt;/code&gt; 成员被自动提取, 并且被pydoc所用. (你可以在你的模块上运行pydoc试一把, 看看它长什么样). 我们对文档字符串的惯例是使用三重双引号&amp;quot;&amp;quot;&amp;quot;( `PEP-257](http://www.python.org/dev/peps/pep-0257/) ). 一个文档字符串应该这样组织: 首先是一行以句号, 问号或惊叹号结尾的概述(或者该文档字符串单纯只有一行). 接着是一个空行. 接着是文档字符串剩下的部分, 它应该与文档字符串的第一行的第一个引号对齐. 下面有更多文档字符串的格式化规范.&lt;/p&gt;
&lt;p&gt;&lt;strong&gt;模块&lt;/strong&gt;&lt;/p&gt;
&lt;p&gt;每个文件应该包含一个许可样板. 根据项目使用的许可(例如, Apache 2.0, BSD, LGPL, GPL), 选择合适的样板.&lt;br&gt;
其开头应是对模块内容和用法的描述.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;&amp;quot;&amp;quot;&amp;quot;A one line summary of the module or program, terminated by a period.

Leave one blank line.  The rest of this docstring should contain an
overall description of the module or program.  Optionally, it may also
contain a brief description of exported classes and functions and/or usage
examples.

Typical usage example:

foo = ClassFoo()
bar = foo.FunctionBar()
&amp;quot;&amp;quot;&amp;quot;
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;strong&gt;函数和方法&lt;/strong&gt;&lt;/p&gt;
&lt;p&gt;下文所指的函数,包括函数, 方法, 以及生成器.&lt;/p&gt;
&lt;p&gt;一个函数必须要有文档字符串, 除非它满足以下条件:&lt;/p&gt;
&lt;ol&gt;
&lt;li&gt;
&lt;p&gt;外部不可见&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;非常短小&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;简单明了&lt;/p&gt;
&lt;p&gt;文档字符串应该包含函数做什么, 以及输入和输出的详细描述. 通常, 不应该描述&amp;quot;怎么做&amp;quot;, 除非是一些复杂的算法. 文档字符串应该提供足够的信息, 当别人编写代码调用该函数时, 他不需要看一行代码, 只要看文档字符串就可以了. 对于复杂的代码, 在代码旁边加注释会比使用文档字符串更有意义.&lt;br&gt;
覆盖基类的子类方法应有一个类似 &lt;code&gt;See base class&lt;/code&gt; 的简单注释来指引读者到基类方法的文档注释.若重载的子类方法和基类方法有很大不同,那么注释中应该指明这些信息.&lt;/p&gt;
&lt;p&gt;关于函数的几个方面应该在特定的小节中进行描述记录， 这几个方面如下文所述. 每节应该以一个标题行开始. 标题行以冒号结尾. 除标题行外, 节的其他内容应被缩进2个空格.&lt;/p&gt;
&lt;p&gt;Args:&lt;/p&gt;
&lt;p&gt;列出每个参数的名字, 并在名字后使用一个冒号和一个空格, 分隔对该参数的描述.如果描述太长超过了单行80字符,使用2或者4个空格的悬挂缩进(与文件其他部分保持一致).&lt;br&gt;
描述应该包括所需的类型和含义.&lt;br&gt;
如果一个函数接受&lt;em&gt;foo(可变长度参数列表)或者**bar (任意关键字参数), 应该详细列出&lt;/em&gt;foo和**bar.&lt;/p&gt;
&lt;p&gt;Returns: (或者 Yields: 用于生成器)&lt;/p&gt;
&lt;p&gt;描述返回值的类型和语义. 如果函数返回None, 这一部分可以省略.&lt;/p&gt;
&lt;p&gt;Raises:&lt;br&gt;
列出与接口有关的所有异常.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;def fetch_smalltable_rows(table_handle: smalltable.Table,
                        keys: Sequence[Union[bytes, str]],
                        require_all_keys: bool = False,
) -&amp;gt; Mapping[bytes, Tuple[str]]:
    &amp;quot;&amp;quot;&amp;quot;Fetches rows from a Smalltable.

    Retrieves rows pertaining to the given keys from the Table instance
    represented by table_handle.  String keys will be UTF-8 encoded.

    Args:
        table_handle: An open smalltable.Table instance.
        keys: A sequence of strings representing the key of each table
        row to fetch.  String keys will be UTF-8 encoded.
        require_all_keys: Optional; If require_all_keys is True only
        rows with values set for all keys will be returned.

    Returns:
        A dict mapping keys to the corresponding table row data
        fetched. Each row is represented as a tuple of strings. For
        example:

        {b&#39;Serak&#39;: (&#39;Rigel VII&#39;, &#39;Preparer&#39;),
        b&#39;Zim&#39;: (&#39;Irk&#39;, &#39;Invader&#39;),
        b&#39;Lrrr&#39;: (&#39;Omicron Persei 8&#39;, &#39;Emperor&#39;)}

        Returned keys are always bytes.  If a key from the keys argument is
        missing from the dictionary, then that row was not found in the
        table (and require_all_keys must have been False).

    Raises:
        IOError: An error occurred accessing the smalltable.
    &amp;quot;&amp;quot;&amp;quot;
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;在 &lt;code&gt;Args:&lt;/code&gt; 上进行换行也是可以的:&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;def fetch_smalltable_rows(table_handle: smalltable.Table,
                        keys: Sequence[Union[bytes, str]],
                        require_all_keys: bool = False,
) -&amp;gt; Mapping[bytes, Tuple[str]]:
    &amp;quot;&amp;quot;&amp;quot;Fetches rows from a Smalltable.

    Retrieves rows pertaining to the given keys from the Table instance
    represented by table_handle.  String keys will be UTF-8 encoded.

    Args:
    table_handle:
        An open smalltable.Table instance.
    keys:
        A sequence of strings representing the key of each table row to
        fetch.  String keys will be UTF-8 encoded.
    require_all_keys:
        Optional; If require_all_keys is True only rows with values set
        for all keys will be returned.

    Returns:
    A dict mapping keys to the corresponding table row data
    fetched. Each row is represented as a tuple of strings. For
    example:

    {b&#39;Serak&#39;: (&#39;Rigel VII&#39;, &#39;Preparer&#39;),
    b&#39;Zim&#39;: (&#39;Irk&#39;, &#39;Invader&#39;),
    b&#39;Lrrr&#39;: (&#39;Omicron Persei 8&#39;, &#39;Emperor&#39;)}

    Returned keys are always bytes.  If a key from the keys argument is
    missing from the dictionary, then that row was not found in the
    table (and require_all_keys must have been False).

    Raises:
    IOError: An error occurred accessing the smalltable.
    &amp;quot;&amp;quot;&amp;quot;
&lt;/code&gt;&lt;/pre&gt;
&lt;/li&gt;
&lt;/ol&gt;
&lt;p&gt;&lt;strong&gt;类&lt;/strong&gt;&lt;/p&gt;
&lt;p&gt;类应该在其定义下有一个用于描述该类的文档字符串. 如果你的类有公共属性(Attributes), 那么文档中应该有一个属性(Attributes)段. 并且应该遵守和函数参数相同的格式.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;class SampleClass(object):
    &amp;quot;&amp;quot;&amp;quot;Summary of class here.

    Longer class information....
     Longer class information....

    Attributes:
        likes_spam: A boolean indicating if we like SPAM or not.
        eggs: An integer count of the eggs we have laid.
    &amp;quot;&amp;quot;&amp;quot;

    def __init__(self, likes_spam=False):
        &amp;quot;&amp;quot;&amp;quot;Inits SampleClass with blah.&amp;quot;&amp;quot;&amp;quot;
        self.likes_spam = likes_spam
        self.eggs = 0

    def public_method(self):
        &amp;quot;&amp;quot;&amp;quot;Performs operation blah.&amp;quot;&amp;quot;&amp;quot;
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;strong&gt;块注释和行注释&lt;/strong&gt;&lt;/p&gt;
&lt;p&gt;最需要写注释的是代码中那些技巧性的部分. 如果你在下次 &lt;a href=&#34;http://en.wikipedia.org/wiki/Code_review&#34;&gt;代码审查&lt;/a&gt;的时候必须解释一下, 那么你应该现在就给它写注释. 对于复杂的操作, 应该在其操作开始前写上若干行注释. 对于不是一目了然的代码, 应在其行尾添加注释.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;# We use a weighted dictionary search to find out where i is in
# the array.  We extrapolate position based on the largest num
# in the array and the array size and then do binary search to
# get the exact number.

if i &amp;amp; (i-1) == 0:7 True if i is 0 or a power of 2.
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;为了提高可读性, 注释应该至少离开代码2个空格.&lt;/p&gt;
&lt;p&gt;另一方面, 绝不要描述代码. 假设阅读代码的人比你更懂Python, 他只是不知道你的代码要做什么.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;# BAD COMMENT: Now go through the b array and make sure whenever i occurs
# the next element is i+1
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;标点符号拼写和语法&#34;&gt;标点符号,拼写和语法&lt;/h2&gt;
&lt;p&gt;tip&lt;br&gt;
注意标点符号,拼写和语法&lt;/p&gt;
&lt;p&gt;注释应有适当的大写和标点,句子应该尽量完整.对于诸如在行尾上的较短注释,可以不那么正式,但是也应该尽量保持风格抑制.&lt;/p&gt;
&lt;h2 id=&#34;类&#34;&gt;类&lt;/h2&gt;
&lt;p&gt;tip&lt;br&gt;
如果一个类不继承自其它类, 就显式的从object继承. 嵌套类也一样.(除非是为了和 python2 兼容)&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;Yes: class SampleClass(object):
         pass


     class OuterClass(object):

         class InnerClass(object):
             pass


     class ChildClass(ParentClass):
         &amp;quot;&amp;quot;&amp;quot;Explicitly inherits from another class already.&amp;quot;&amp;quot;&amp;quot;


No: class SampleClass:
        pass


    class OuterClass:

        class InnerClass:
            pass
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;继承自 &lt;code&gt;object&lt;/code&gt; 是为了使属性(properties)正常工作, 并且这样可以保护你的代码, 使其不受 &lt;a href=&#34;http://www.python.org/dev/peps/pep-3000/&#34;&gt;PEP-3000&lt;/a&gt; 的一个特殊的潜在不兼容性影响. 这样做也定义了一些特殊的方法, 这些方法实现了对象的默认语义, 包括 &lt;code&gt;__new__, __init__, __delattr__, __getattribute__, __setattr__, __hash__, __repr__, and __str__&lt;/code&gt; .&lt;/p&gt;
&lt;h2 id=&#34;字符串&#34;&gt;字符串&lt;/h2&gt;
&lt;p&gt;tip&lt;br&gt;
即使参数都是字符串, 使用%操作符或者格式化方法格式化字符串. 不过也不能一概而论, 你需要在+和%之间好好判定.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;Yes: x = a + b
     x = &#39;%s, %s!&#39; % (imperative, expletive)
     x = &#39;{}, {}!&#39;.format(imperative, expletive)
     x = &#39;name: %s; score: %d&#39; % (name, n)
     x = &#39;name: {}; score: {}&#39;.format(name, n)
         

No: x = &#39;%s%s&#39; % (a, b)  # use + in this case
    x = &#39;{}{}&#39;.format(a, b)  # use + in this case
    x = imperative + &#39;, &#39; + expletive + &#39;!&#39;
    x = &#39;name: &#39; + name + &#39;; score: &#39; + str(n)
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;避免在循环中用+和+=操作符来累加字符串. 由于字符串是不可变的, 这样做会创建不必要的临时对象, 并且导致二次方而不是线性的运行时间. 作为替代方案, 你可以将每个子串加入列表, 然后在循环结束后用 &lt;code&gt;.join&lt;/code&gt; 连接列表. (也可以将每个子串写入一个 &lt;code&gt;cStringIO.StringIO&lt;/code&gt; 缓存中.)&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;Yes: items = [&#39;&amp;lt;table*&#39;]
     for last_name, first_name in employee_list:
         items.append(&#39;&amp;lt;tr*&amp;lt;td*%s, %s&amp;lt;/td*&amp;lt;/tr*&#39; % (last_name, first_name))
     items.append(&#39;&amp;lt;/table*&#39;)
     employee_table = &#39;&#39;.join(items)


No: employee_table = &#39;&amp;lt;table*&#39;
    for last_name, first_name in employee_list:
        employee_table += &#39;&amp;lt;tr*&amp;lt;td*%s, %s&amp;lt;/td*&amp;lt;/tr*&#39; % (last_name, first_name)
    employee_table += &#39;&amp;lt;/table*&#39;
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;在同一个文件中, 保持使用字符串引号的一致性. 使用单引号&#39;或者双引号&amp;quot;之一用以引用字符串, 并在同一文件中沿用. 在字符串内可以使用另外一种引号, 以避免在字符串中使用.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;Yes:
    Python(&#39;Why are you hiding your eyes?&#39;)
    Gollum(&amp;quot;I&#39;m scared of lint errors.&amp;quot;)
    Narrator(&#39;&amp;quot;Good!&amp;quot; thought a happy Python reviewer.&#39;)


No:
    Python(&amp;quot;Why are you hiding your eyes?&amp;quot;)
    Gollum(&#39;The lint. It burns. It burns us.&#39;)
    Gollum(&amp;quot;Always the great lint. Watching. Watching.&amp;quot;)
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;为多行字符串使用三重双引号&amp;quot;&amp;quot;&amp;quot;而非三重单引号&#39;&#39;&#39;. 当且仅当项目中使用单引号&#39;来引用字符串时, 才可能会使用三重&#39;&#39;&#39;为非文档字符串的多行字符串来标识引用. 文档字符串必须使用三重双引号&amp;quot;&amp;quot;&amp;quot;.&lt;br&gt;
多行字符串不应随着代码其他部分缩进的调整而发生位置移动. 如果需要避免在字符串中嵌入额外的空间,可以使用串联的单行字符串或者使用 &lt;a href=&#34;https://docs.python.org/zh-cn/3/library/textwrap.html#textwrap.dedent&#34;&gt;textwrap.dedent()&lt;/a&gt;来删除每行多余的空间.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;No:
long_string = &amp;quot;&amp;quot;&amp;quot;This is pretty ugly.
Don&#39;t do this.
&amp;quot;&amp;quot;&amp;quot;
           

Yes:
long_string = &amp;quot;&amp;quot;&amp;quot;This is fine if your use case can accept
  extraneous leading spaces.&amp;quot;&amp;quot;&amp;quot;


Yes:
long_string = (&amp;quot;And this is fine if you cannot accept\n&amp;quot; +
       &amp;quot;extraneous leading spaces.&amp;quot;)


Yes:
long_string = (&amp;quot;And this too is fine if you cannot accept\n&amp;quot;
       &amp;quot;extraneous leading spaces.&amp;quot;)

Yes:
import textwrap

long_string = textwrap.dedent(&amp;quot;&amp;quot;&amp;quot;\
  This is also fine, because textwrap.dedent()
  will collapse common leading spaces in each line.&amp;quot;&amp;quot;&amp;quot;)
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;文件和sockets&#34;&gt;文件和sockets&lt;/h2&gt;
&lt;p&gt;tip&lt;br&gt;
在文件和sockets结束时, 显式的关闭它.&lt;/p&gt;
&lt;p&gt;除文件外, sockets或其他类似文件的对象在没有必要的情况下打开, 会有许多副作用, 例如:&lt;/p&gt;
&lt;ol&gt;
&lt;li&gt;它们可能会消耗有限的系统资源, 如文件描述符. 如果这些资源在使用后没有及时归还系统, 那么用于处理这些对象的代码会将资源消耗殆尽.&lt;/li&gt;
&lt;li&gt;持有文件将会阻止对于文件的其他诸如移动、删除之类的操作.&lt;/li&gt;
&lt;li&gt;仅仅是从逻辑上关闭文件和sockets, 那么它们仍然可能会被其共享的程序在无意中进行读或者写操作. 只有当它们真正被关闭后, 对于它们尝试进行读或者写操作将会抛出异常, 并使得问题快速显现出来.&lt;/li&gt;
&lt;/ol&gt;
&lt;p&gt;而且, 幻想当文件对象析构时, 文件和sockets会自动关闭, 试图将文件对象的生命周期和文件的状态绑定在一起的想法, 都是不现实的. 因为有如下原因:&lt;/p&gt;
&lt;ol&gt;
&lt;li&gt;
&lt;p&gt;没有任何方法可以确保运行环境会真正的执行文件的析构. 不同的Python实现采用不同的内存管理技术, 比如延时垃圾处理机制. 延时垃圾处理机制可能会导致对象生命周期被任意无限制的延长.&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;对于文件意外的引用,会导致对于文件的持有时间超出预期(比如对于异常的跟踪, 包含有全局变量等).&lt;/p&gt;
&lt;/li&gt;
&lt;/ol&gt;
&lt;p&gt;推荐使用 &lt;a href=&#34;http://docs.python.org/reference/compound_stmts.html#the-with-statement&#34;&gt;&amp;quot;with&amp;quot;语句&lt;/a&gt; 以管理文件:&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;with open(&amp;quot;hello.txt&amp;quot;) as hello_file:
    for line in hello_file:
        print line
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;对于不支持使用&amp;quot;with&amp;quot;语句的类似文件的对象,使用 contextlib.closing():&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;import contextlib
  
with contextlib.closing(urllib.urlopen(&amp;quot;http://www.python.org/&amp;quot;)) as front_page:
      for line in front_page:
          print line
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;Legacy AppEngine 中Python 2.5的代码如使用&amp;quot;with&amp;quot;语句, 需要添加 &lt;code&gt;from __future__ import with_statement&lt;/code&gt; .&lt;/p&gt;
&lt;h2 id=&#34;todo注释&#34;&gt;TODO注释&lt;/h2&gt;
&lt;p&gt;tip&lt;br&gt;
为临时代码使用TODO注释, 它是一种短期解决方案. 不算完美, 但够好了.&lt;/p&gt;
&lt;p&gt;TODO注释应该在所有开头处包含&amp;quot;TODO&amp;quot;字符串, 紧跟着是用括号括起来的你的名字, email地址或其它标识符. 然后是一个可选的冒号. 接着必须有一行注释, 解释要做什么. 主要目的是为了有一个统一的TODO格式, 这样添加注释的人就可以搜索到(并可以按需提供更多细节). 写了TODO注释并不保证写的人会亲自解决问题. 当你写了一个TODO, 请注上你的名字.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;# TODO(kl@gmail.com): Use a &amp;quot;*&amp;quot; here for string repetition.
# TODO(Zeke) Change this to use relations.
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;如果你的TODO是&amp;quot;将来做某事&amp;quot;的形式, 那么请确保你包含了一个指定的日期(&amp;quot;2009年11月解决&amp;quot;)或者一个特定的事件(&amp;quot;等到所有的客户都可以处理XML请求就移除这些代码&amp;quot;).&lt;/p&gt;
&lt;h2 id=&#34;导入格式&#34;&gt;导入格式&lt;/h2&gt;
&lt;p&gt;tip&lt;br&gt;
每个导入应该独占一行, &lt;code&gt;typing&lt;/code&gt; 的导入除外&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;Yes: import os
    import sys
    from typing import Mapping, Sequence 


No:  import os, sys
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;导入总应该放在文件顶部, 位于模块注释和文档字符串之后, 模块全局变量和常量之前.  导入应该按照从最通用到最不通用的顺序分组:&lt;/p&gt;
&lt;p&gt;#. &lt;code&gt;__future__&lt;/code&gt; 导入&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;from __future__ import absolute_import
from __future__ import division
from __future__ import print_function
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;#. 标准库导入&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;import sys
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;#. 第三方库导入&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;import tensorflow as tf
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;#. 本地代码子包导入&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;from otherproject.ai import mind
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;每种分组中,  应该根据每个模块的完整包路径按字典序排序, 忽略大小写.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;import collections
import queue
import sys

from absl import app
from absl import flags
import bs4
import cryptography
import tensorflow as tf

from book.genres import scifi
from myproject.backend import huxley
from myproject.backend.hgwells import time_machine
from myproject.backend.state_machine import main_loop
from otherproject.ai import body
from otherproject.ai import mind
from otherproject.ai import soul

# Older style code may have these imports down here instead:
#from myproject.backend.hgwells import time_machine
#from myproject.backend.state_machine import main_loop 
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;语句&#34;&gt;语句&lt;/h2&gt;
&lt;p&gt;tip&lt;br&gt;
通常每个语句应该独占一行&lt;/p&gt;
&lt;p&gt;不过, 如果测试结果与测试语句在一行放得下, 你也可以将它们放在同一行.  如果是if语句, 只有在没有else时才能这样做. 特别地, 绝不要对 &lt;code&gt;try/except&lt;/code&gt; 这样做, 因为try和except不能放在同一行.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;Yes:

  if foo: bar(foo)

  
No:

  if foo: bar(foo)
  else:   baz(foo)

  try:               bar(foo)
  except ValueError: baz(foo)

  try:
      bar(foo)
  except ValueError: baz(foo)
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;访问控制&#34;&gt;访问控制&lt;/h2&gt;
&lt;p&gt;tip&lt;br&gt;
在Python中, 对于琐碎又不太重要的访问函数, 你应该直接使用公有变量来取代它们, 这样可以避免额外的函数调用开销. 当添加更多功能时, 你可以用属性(property)来保持语法的一致性.&lt;/p&gt;
&lt;p&gt;(译者注: 重视封装的面向对象程序员看到这个可能会很反感, 因为他们一直被教育: 所有成员变量都必须是私有的! 其实, 那真的是有点麻烦啊. 试着去接受Pythonic哲学吧)&lt;/p&gt;
&lt;p&gt;*另一方面, 如果访问更复杂, 或者变量的访问开销很显著, 那么你应该使用像 &lt;code&gt;get_foo()&lt;/code&gt; 和 &lt;code&gt;set_foo()&lt;/code&gt; 这样的函数调用. 如果之前的代码行为允许通过属性(property)访问 , 那么就不要将新的访问函数与属性绑定. 这样, 任何试图通过老方法访问变量的代码就没法运行, 使用者也就会意识到复杂性发生了变化.&lt;/p&gt;
&lt;h2 id=&#34;命名&#34;&gt;命名&lt;/h2&gt;
&lt;p&gt;tip&lt;br&gt;
模块名写法: &lt;code&gt;module_name&lt;/code&gt; ;包名写法: &lt;code&gt;package_name&lt;/code&gt; ;类名: &lt;code&gt;ClassName&lt;/code&gt; ;方法名: &lt;code&gt;method_name&lt;/code&gt; ;异常名: &lt;code&gt;ExceptionName&lt;/code&gt; ;函数名: &lt;code&gt;function_name&lt;/code&gt; ;全局常量名: &lt;code&gt;GLOBAL_CONSTANT_NAME&lt;/code&gt; ;全局变量名: &lt;code&gt;global_var_name&lt;/code&gt; ;实例名: &lt;code&gt;instance_var_name&lt;/code&gt; ;函数参数名: &lt;code&gt;function_parameter_name&lt;/code&gt; ;局部变量名: &lt;code&gt;local_var_name&lt;/code&gt; .&lt;br&gt;
函数名,变量名和文件名应该是描述性的,尽量避免缩写,特别要避免使用非项目人员不清楚难以理解的缩写,不要通过删除单词中的字母来进行缩写.&lt;br&gt;
始终使用 &lt;code&gt;.py&lt;/code&gt; 作为文件后缀名,不要用破折号.&lt;/p&gt;
&lt;p&gt;&lt;strong&gt;应该避免的名称&lt;/strong&gt;&lt;/p&gt;
&lt;ol&gt;
&lt;li&gt;单字符名称, 除了计数器和迭代器,作为 &lt;code&gt;try/except&lt;/code&gt; 中异常声明的 &lt;code&gt;e&lt;/code&gt;,作为 &lt;code&gt;with&lt;/code&gt; 语句中文件句柄的 &lt;code&gt;f&lt;/code&gt;.&lt;/li&gt;
&lt;li&gt;包/模块名中的连字符(-)&lt;/li&gt;
&lt;li&gt;双下划线开头并结尾的名称(Python保留, 例如__init__)&lt;/li&gt;
&lt;/ol&gt;
&lt;p&gt;&lt;strong&gt;命名约定&lt;/strong&gt;&lt;/p&gt;
&lt;ol&gt;
&lt;li&gt;所谓&amp;quot;内部(Internal)&amp;quot;表示仅模块内可用, 或者, 在类内是保护或私有的.&lt;/li&gt;
&lt;li&gt;用单下划线(_)开头表示模块变量或函数是protected的(使用from module import *时不会包含).&lt;/li&gt;
&lt;li&gt;用双下划线(__)开头的实例变量或方法表示类内私有.&lt;/li&gt;
&lt;li&gt;将相关的类和顶级函数放在同一个模块里. 不像Java, 没必要限制一个类一个模块.&lt;/li&gt;
&lt;li&gt;对类名使用大写字母开头的单词(如CapWords, 即Pascal风格), 但是模块名应该用小写加下划线的方式(如lower_with_under.py). 尽管已经有很多现存的模块使用类似于CapWords.py这样的命名, 但现在已经不鼓励这样做, 因为如果模块名碰巧和类名一致, 这会让人困扰.&lt;/li&gt;
&lt;/ol&gt;
&lt;p&gt;&lt;strong&gt;文件名&lt;/strong&gt;&lt;/p&gt;
&lt;p&gt;所有python脚本文件都应该以 &lt;code&gt;.py&lt;/code&gt; 为后缀名且不包含 &lt;code&gt;-&lt;/code&gt;.若是需要一个无后缀名的可执行文件,可以使用软联接或者包含 &lt;code&gt;exec &amp;quot;$0.py&amp;quot; &amp;quot;$@&amp;quot;&lt;/code&gt; 的bash脚本.&lt;/p&gt;
&lt;p&gt;&lt;em&gt;Python之父Guido推荐的规范&lt;/em&gt;&lt;/p&gt;
&lt;table&gt;
&lt;thead&gt;
&lt;tr&gt;
&lt;th style=&#34;text-align:left&#34;&gt;Type&lt;/th&gt;
&lt;th style=&#34;text-align:left&#34;&gt;Public&lt;/th&gt;
&lt;th style=&#34;text-align:left&#34;&gt;Internal&lt;/th&gt;
&lt;/tr&gt;
&lt;/thead&gt;
&lt;tbody&gt;
&lt;tr&gt;
&lt;td style=&#34;text-align:left&#34;&gt;Modules&lt;/td&gt;
&lt;td style=&#34;text-align:left&#34;&gt;lower_with_under&lt;/td&gt;
&lt;td style=&#34;text-align:left&#34;&gt;_lower_with_under&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td style=&#34;text-align:left&#34;&gt;Packages&lt;/td&gt;
&lt;td style=&#34;text-align:left&#34;&gt;lower_with_under&lt;/td&gt;
&lt;td style=&#34;text-align:left&#34;&gt;&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;
&lt;td style=&#34;text-align:left&#34;&gt;Classes&lt;/td&gt;
&lt;td style=&#34;text-align:left&#34;&gt;CapWords&lt;/td&gt;
&lt;td style=&#34;text-align:left&#34;&gt;_CapWords&lt;/td&gt;
&lt;/tr&gt;
&lt;tr&gt;

&lt;h2 id=&#34;main&#34;&gt;Main&lt;/h2&gt;
&lt;p&gt;tip&lt;br&gt;
即使是一个打算被用作脚本的文件, 也应该是可导入的. 并且简单的导入不应该导致这个脚本的主功能(main functionality)被执行, 这是一种副作用. 主功能应该放在一个main()函数中.&lt;/p&gt;
&lt;p&gt;在Python中, pydoc以及单元测试要求模块必须是可导入的. 你的代码应该在执行主程序前总是检查 &lt;code&gt;if __name__ == &#39;__main__&#39;&lt;/code&gt; , 这样当模块被导入时主程序就不会被执行.&lt;/p&gt;
&lt;p&gt;若使用 &lt;code&gt;absl](https://github.com/abseil/abseil-py), 请使用&lt;/code&gt;app.run` :&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;from absl import app
...

def main(argv):
process non-flag arguments
    ...

if __name__ == &#39;__main__&#39;:
    app.run(main)
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;否则,使用:&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;def main():
    ...

if __name__ == &#39;__main__&#39;:
    main()
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;所有的顶级代码在模块导入时都会被执行. 要小心不要去调用函数, 创建对象, 或者执行那些不应该在使用pydoc时执行的操作.&lt;/p&gt;
&lt;h2 id=&#34;函数长度&#34;&gt;函数长度&lt;/h2&gt;
&lt;p&gt;tip&lt;br&gt;
推荐函数功能尽量集中,简单,小巧&lt;/p&gt;
&lt;p&gt;不对函数长度做硬性限制.但是若一个函数超过来40行,推荐考虑一下是否可以在不损害程序结构的情况下对其进行分解.&lt;br&gt;
因为即使现在长函数运行良好,但几个月后可能会有人修改它并添加一些新的行为,这容易产生难以发现的bug.保持函数的简练,使其更加容易阅读和修改.&lt;br&gt;
当遇到一些很长的函数时,若发现调试比较困难或是想在其他地方使用函数的一部分功能,不妨考虑将这个场函数进行拆分.&lt;/p&gt;
&lt;h2 id=&#34;类型注释&#34;&gt;类型注释&lt;/h2&gt;
&lt;p&gt;&lt;strong&gt;通用规则&lt;/strong&gt;&lt;/p&gt;
&lt;ol&gt;
&lt;li&gt;请先熟悉下&lt;a href=&#34;https://www.python.org/dev/peps/pep-0484/&#34;&gt;PEP-484&lt;/a&gt;&lt;/li&gt;
&lt;li&gt;对于方法，仅在必要时才对 &lt;code&gt;self&lt;/code&gt; 或 &lt;code&gt;cls&lt;/code&gt; 注释&lt;/li&gt;
&lt;li&gt;若对类型没有任何显示，请使用 &lt;code&gt;Any&lt;/code&gt;&lt;/li&gt;
&lt;li&gt;无需注释模块中的所有函数&lt;/li&gt;
&lt;li&gt;公共的API需要注释&lt;/li&gt;
&lt;li&gt;在代码的安全性，清晰性和灵活性上进行权衡是否注释&lt;/li&gt;
&lt;li&gt;对于容易出现类型相关的错误的代码进行注释&lt;/li&gt;
&lt;li&gt;难以理解的代码请进行注释&lt;/li&gt;
&lt;li&gt;若代码中的类型已经稳定，可以进行注释. 对于一份成熟的代码，多数情况下，即使注释了所有的函数，也不会丧失太多的灵活性.&lt;/li&gt;
&lt;/ol&gt;
&lt;p&gt;&lt;strong&gt;换行&lt;/strong&gt;&lt;/p&gt;
&lt;p&gt;尽量遵守既定的缩进规则.注释后，很多函数签名将会变成每行一个参数.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;def my_method(self,
    first_var: int,
    second_var: Foo,
    third_var: Optional[Bar]) -&amp;gt; int:
...
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;尽量在变量之间换行而不是在变量和类型注释之间.当然,若所有东西都在一行上,也可以接受.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;def my_method(self, first_var: int) -&amp;gt; int:
...
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;若是函数名,末位形参和返回值的类型注释太长,也可以进行换行,并在新行进行4格缩进.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;def my_method(
     self, first_var: int) -&amp;gt; Tuple[MyLongType1, MyLongType1]:
...
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;若是末位形参和返回值类型注释不适合在同一行上,可以换行,缩进为4空格,并保持闭合的括号 &lt;code&gt;)&lt;/code&gt; 和 &lt;code&gt;def&lt;/code&gt; 对齐&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;Yes:
    def my_method(
        self, other_arg: Optional[MyLongType]
    ) -&amp;gt; Dict[OtherLongType, MyLongType]:
    ...
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;code&gt;pylint&lt;/code&gt; 允许闭合括号 &lt;code&gt;)&lt;/code&gt; 换至新行并与 开启括号 &lt;code&gt;(&lt;/code&gt; 对齐,但这样的可读性不好.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;No:
    def my_method(self,
                    other_arg: Optional[MyLongType]
                 ) -&amp;gt; Dict[OtherLongType, MyLongType]:
    ...    
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;如上所示,尽量不要在一个类型注释中进行换行.但是有时类型注释过长需要换行时,请尽量保持子类型中不被换行.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;    def my_method(
        self,
        first_var: Tuple[List[MyLongType1],
                         List[MyLongType2]],
        second_var: List[Dict[
            MyLongType3, MyLongType4]]) -&amp;gt; None:
    ...
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;若一个类型注释确实太长,则应优先考虑对过长的类型使用别名 &lt;a href=&#34;https://google.github.io/styleguide/pyguide.html#typing-aliases&#34;&gt;alias&lt;/a&gt;. 其次是考虑在冒号后 &lt;code&gt;:&lt;/code&gt;进行换行并添加4格空格缩进.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;Yes:
    def my_function(
        long_variable_name:
            long_module_name.LongTypeName,
    ) -&amp;gt; None:
    ...



No:
    def my_function(
        long_variable_name: long_module_name.
            LongTypeName,
    ) -&amp;gt; None:
    ...
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;strong&gt;预先声明&lt;/strong&gt;&lt;/p&gt;
&lt;p&gt;若需要使用一个当前模块尚未定义的类名,比如想在类声明中使用类名,请使用类名的字符串&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;class MyClass:

    def __init__(self,
    stack: List[&amp;quot;MyClass&amp;quot;]) -&amp;gt; None:
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;strong&gt;参数默认值&lt;/strong&gt;&lt;/p&gt;
&lt;p&gt;依据 &lt;a href=&#34;https://www.python.org/dev/peps/pep-0008/#other-recommendations&#34;&gt;PEP-008&lt;/a&gt; ,仅对同时具有类型注释和默认值的参数的 &lt;code&gt;=&lt;/code&gt; 周围加空格.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;Yes:
    def func(a: int = 0) -&amp;gt; int:
    ...



No:
    def func(a:int=0) -&amp;gt; int:
    ...
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;strong&gt;NoneType&lt;/strong&gt;&lt;/p&gt;
&lt;p&gt;在python的类型系统中, &lt;code&gt;NoneType&lt;/code&gt; 是 &amp;quot;一等对象&amp;quot;,为了输入方便, &lt;code&gt;None&lt;/code&gt; 是 &lt;code&gt;NoneType&lt;/code&gt; 的别名.一个变量若是 &lt;code&gt;None&lt;/code&gt;,则该变量必须被声明.我们可以使用 &lt;code&gt;Union&lt;/code&gt;, 但若类型仅仅只是对应另一个其他类型,建议使用 &lt;code&gt;Optional&lt;/code&gt;.&lt;br&gt;
尽量显式而非隐式的使用 &lt;code&gt;Optional&lt;/code&gt;.在PEP-484的早期版本中允许使用 &lt;code&gt;a: Text = None&lt;/code&gt; 来替代 &lt;code&gt;a: Optional[Text] = None&lt;/code&gt;,当然,现在不推荐这么做了.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;Yes:
    def func(a: Optional[Text], b: Optional[Text] = None) -&amp;gt; Text:
        ...
    def multiple_nullable_union(a: Union[None, Text, int]) -&amp;gt; Text
        ...



No:
    def nullable_union(a: Union[None, Text]) -&amp;gt; Text:
        ...
    def implicit_optional(a: Text = None) -&amp;gt; Text:
        ...
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;strong&gt;类型别名&lt;/strong&gt;&lt;/p&gt;
&lt;p&gt;复杂类型应使用别名,别名的命名可参照帕斯卡命名.若别名仅在当前模块使用,应在名称前加&lt;code&gt;_&lt;/code&gt;变为私有的.&lt;br&gt;
如下例子中,模块名和类型名连一起过长:&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;_ShortName = module_with_long_name.TypeWithLongName
ComplexMap = Mapping[Text, List[Tuple[int, int]]]
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;strong&gt;忽略类型注释&lt;/strong&gt;&lt;br&gt;
可以使用特殊的行尾注释 &lt;code&gt;# type: ignore&lt;/code&gt; 来禁用该行的类型检查.&lt;br&gt;
&lt;code&gt;pytype&lt;/code&gt; 针对特定错误有一个禁用选项(类似lint):&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;# pytype: disable=attribute-error
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;strong&gt;变量类型注解&lt;/strong&gt;&lt;/p&gt;
&lt;p&gt;当一个内部变量难以推断其类型时,可以有以下方法来指示其类型:&lt;/p&gt;
&lt;p&gt;&lt;strong&gt;类型注释&lt;/strong&gt;&lt;/p&gt;
&lt;p&gt;使用行尾注释 &lt;code&gt;# type:&lt;/code&gt;:&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;a = SomeUndecoratedFunction()  # type: Foo
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;strong&gt;带类型注解的复制&lt;/strong&gt;&lt;br&gt;
如函数形参一样,在变量名和等号间加入冒号和类型:&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;a: Foo = SomeUndecoratedFunction()
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;strong&gt;Tuples vs Lists&lt;/strong&gt;&lt;/p&gt;
&lt;p&gt;类型化的Lists只能包含单一类型的元素.但类型化的Tuples可以包含单一类型的元素或者若干个不同类型的元素,通常被用来注解返回值的类型.&lt;br&gt;
(译者注: 注意这里是指的类型注解中的写法,实际python中,list和tuple都是可以在一个序列中包含不同类型元素的,当然,本质其实list和tuple中放的是元素的引用)&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;a = [1, 2, 3]  # type: List[int]
b = (1, 2, 3)  # type: Tuple[int, ...]
c = (1, &amp;quot;2&amp;quot;, 3.5)  # type: Tuple[int, Text, float]    
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;strong&gt;TypeVars&lt;/strong&gt;&lt;/p&gt;
&lt;p&gt;python的类型系统是支持泛型的.一种常见的方式就是使用工厂函数 &lt;code&gt;TypeVars&lt;/code&gt;.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;from typing import List, TypeVar
T = TypeVar(&amp;quot;T&amp;quot;)
...
def next(l: List[T]) -&amp;gt; T:
    return l.pop()
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;TypeVar也可以被限定成若干种类型&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;AddableType = TypeVar(&amp;quot;AddableType&amp;quot;, int, float, Text)
def add(a: AddableType, b: AddableType) -&amp;gt; AddableType:
     return a + b
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;code&gt;typing&lt;/code&gt; 模块中一个常见的预定义类型变量是 &lt;code&gt;AnyStr&lt;/code&gt;.它可以用来注解类似 &lt;code&gt;bytes&lt;/code&gt;, &lt;code&gt;unicode&lt;/code&gt; 以及一些相似类型.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;from typing import AnyStr
def check_length(x: AnyStr) -&amp;gt; AnyStr:
    if len(x)](= 42:
        return x
    raise ValueError()
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;strong&gt;字符串类型&lt;/strong&gt;&lt;/p&gt;
&lt;p&gt;如何正确的注释字符串的相关类型和要使用的python版本有关.&lt;br&gt;
对于仅在 python3 下运行的代码,首选使用 &lt;code&gt;str&lt;/code&gt;. 使用 &lt;code&gt;Text&lt;/code&gt; 也可以.但是两个不要混用,保持风格一致.&lt;br&gt;
对于需要兼容 python2 的代码,使用 &lt;code&gt;Text&lt;/code&gt;.在少数情况下,使用 &lt;code&gt;str&lt;/code&gt; 也许更加清晰.不要使用 &lt;code&gt;unicode&lt;/code&gt;,因为 python3 里没有这个类型.&lt;br&gt;
造成这种差异的原因是因为,在不同的python版本中,&lt;code&gt;str&lt;/code&gt; 意义不同.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;No:
    def py2_code(x: str) -&amp;gt; unicode:
    ...
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;对于需要处理二进制数据的代码,使用 &lt;code&gt;bytes&lt;/code&gt;.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;def deals_with_binary_data(x: bytes) -&amp;gt; bytes:
...
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;python2 中的文本类数据类型包括&lt;code&gt;str&lt;/code&gt;和&lt;code&gt;unicode&lt;/code&gt;,而python3 中仅有 &lt;code&gt;str&lt;/code&gt;.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;from typing import Text
...
def py2_compatible(x: Text) -&amp;gt; Text:
...
def py3_only(x: str) -&amp;gt; str:
...
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;若类型既可以是二进制也可以是文本,那么就使用 &lt;code&gt;Union&lt;/code&gt; 进行注解,并按照之前规则使用合适的文本类型注释.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;from typing import Text, Union
...
def py2_compatible(x: Union[bytes, Text]) -&amp;gt; Union[bytes, Text]:
...
def py3_only(x: Union[bytes, str]) -&amp;gt; Union[bytes, str]:
...
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;若一个函数中的字符串类型始终相同,比如上述函数中返回值类型和形参类型都一样,使用 &lt;a href=&#34;https://google.github.io/styleguide/pyguide.html#typing-type-var&#34;&gt;AnyStr&lt;/a&gt;. 这样写可以方便将代码移植到 python3&lt;/p&gt;
&lt;p&gt;&lt;strong&gt;类型的导入&lt;/strong&gt;&lt;/p&gt;
&lt;p&gt;对于 &lt;code&gt;typing&lt;/code&gt; 模块中类的导入,请直接导入类本身.你可以显式的在一行中从 &lt;code&gt;typing&lt;/code&gt; 模块导入多个特定的类,例如:&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;from typing import Any, Dict, Optional
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;以此方式导入的类将被加入到本地的命名空间,因此所有 &lt;code&gt;typing&lt;/code&gt; 模块中的类都应被视为关键字,不要在代码中定义并覆盖它们.若这些类和现行代码中的变量或者方法发生命名冲突,可以考虑使用 &lt;code&gt;import x as y&lt;/code&gt;的导入形式:&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;from typing import Any as AnyType
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;strong&gt;条件导入&lt;/strong&gt;&lt;/p&gt;
&lt;p&gt;在一些特殊情况下,比如当在运行时需要避免类型检查所需的一些导入时,可能会用到条件导入.但这类方法并不推荐,首选方法应是重构代码使类型检查所需的模块可以在顶层导入.&lt;br&gt;
仅用于类型注解的导入可以放在 &lt;code&gt;if TYPE_CHECKING:&lt;/code&gt; 语句块内.&lt;/p&gt;
&lt;ol&gt;
&lt;li&gt;
&lt;p&gt;通过条件导入引入的类的注解须是字符串string,这样才能和python3.6之前的代码兼容.因为python3.6之前,类型注解是会进行求值的.&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;条件导入引入的包应仅仅用于类型注解,别名也是如此.否则,将引起运行错误,条件导入的包在运行时是不会被实际导入的.&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;条件导入的语句块应放在所有常规导入的语句块之后.&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;在条件导入的语句块的导入语句之间不应有空行.&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;和常规导入一样,请对该导入语句进行排序.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt; import typing
 if typing.TYPE_CHECKING:
     import sketch
 def f(x: &amp;quot;sketch.Sketch&amp;quot;): ...
&lt;/code&gt;&lt;/pre&gt;
&lt;/li&gt;
&lt;/ol&gt;
&lt;p&gt;&lt;strong&gt;循环依赖&lt;/strong&gt;&lt;/p&gt;
&lt;p&gt;由类型注释引起的循环依赖可能会导致代码异味,应对其进行重构.虽然从技术上我们可以兼容循环依赖,但是 &lt;a href=&#34;https://google.github.io/styleguide/pyguide.html#typing-build-deps&#34;&gt;构建系统&lt;/a&gt; 是不会容忍这样做的,因为每个模块都需要依赖一个其他模块.&lt;br&gt;
将引起循环依赖的导入模块使用 &lt;code&gt;Any&lt;/code&gt; 导入.使用 &lt;code&gt;alias&lt;/code&gt; 来起一个有意义的别名,推荐使用真正模块的类型名的字符串作为别名(Any的任何属性依然是Any,使用字符串只是帮助我们理解代码).别名的定义应该和最后的导入语句之间空一行.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;from typing import Any

some_mod = Any  # some_mod.py imports this module.
 ...

def my_method(self, var: &amp;quot;some_mod.SomeType&amp;quot;) -&amp;gt; None:
 ...
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;strong&gt;泛型&lt;/strong&gt;&lt;/p&gt;
&lt;p&gt;在注释时,尽量将泛型类型注释为类型参数.否则, &lt;a href=&#34;https://www.python.org/dev/peps/pep-0484/#the-any-type&#34;&gt;泛型参数将被视为是 Any&lt;/a&gt; .&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;def get_names(employee_ids: List[int]) -&amp;gt; Dict[int, Any]:
...



These are both interpreted as get_names(employee_ids: List[Any]) -&amp;gt; Dict[Any, Any]
def get_names(employee_ids: list) -&amp;gt; Dict:
...

def get_names(employee_ids: List) -&amp;gt; Dict:
...
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;若实在要用 Any 作为泛型类型,请显式的使用它.但在多数情况下, &lt;code&gt;TypeVar&lt;/code&gt; 通常可能是更好的选择.&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;def get_names(employee_ids: List[Any]) -&amp;gt; Dict[Any, Text]:
    &amp;quot;&amp;quot;&amp;quot;Returns a mapping from employee ID to employee name for given IDs.&amp;quot;&amp;quot;&amp;quot;



T = TypeVar(&#39;T&#39;)
def get_names(employee_ids: List[T]) -&amp;gt; Dict[T, Text]:
    &amp;quot;&amp;quot;&amp;quot;Returns a mapping from employee ID to employee name for given IDs.&amp;quot;&amp;quot;&amp;quot; 
&lt;/code&gt;&lt;/pre&gt;
&lt;hr&gt;
&lt;hr&gt;
&lt;p&gt;参考自&lt;a href=&#34;https://github.com/zh-google-styleguide/zh-google-styleguide/blob/master/google-python-styleguide/python_style_rules.rst&#34;&gt;zh-google-styleguide&lt;/a&gt;&lt;/p&gt;
">pyhon_风格规范_Google</a>
      </div>
      
      <div class="item">
        <a class="result-title" style="opacity: 0;" href="https://zdblog.top/post/markdown-shi-yong-shuo-ming/"" data-c="
          &lt;h1 id=&#34;1-标题&#34;&gt;1 标题&lt;/h1&gt;
&lt;h2 id=&#34;11-使用kbdkbd和kbd-kbd标记一级和二级标题&#34;&gt;1.1 使用&lt;kbd&gt;=&lt;/kbd&gt;和&lt;kbd&gt;-&lt;/kbd&gt;标记一级和二级标题&lt;/h2&gt;
&lt;p&gt;=和-标记语法格式如下：&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;一级标题    
=============
二级标题
-------------
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;12-使用标记&#34;&gt;1.2 使用#标记&lt;/h2&gt;
&lt;p&gt;使用&lt;kbd&gt;#&lt;/kbd&gt;可标记1-6级标题，一级标题对应&lt;kbd&gt;#&lt;/kbd&gt;,二级标题对应&lt;kbd&gt;##&lt;/kbd&gt;，以此类推&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;# 一级标题
## 二级标题
### 三级标题
#### 四级标题
##### 五级标题
###### 六级标题
&lt;/code&gt;&lt;/pre&gt;
&lt;h1 id=&#34;2-段落&#34;&gt;2 段落&lt;/h1&gt;
&lt;p&gt;Markdown段落没有特殊的格式，段落的换行是使用&lt;strong&gt;两个以上空格加回车&lt;/strong&gt;，也可以使用&lt;strong&gt;空行&lt;/strong&gt;。&lt;/p&gt;
&lt;h2 id=&#34;21-字体&#34;&gt;2.1 字体&lt;/h2&gt;
&lt;p&gt;Markdown可以使用以下几种字体&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;*斜体*
**粗体**
***粗斜体***
_斜体_
__粗体__
___粗斜体___
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;22-分隔线&#34;&gt;2.2 分隔线&lt;/h2&gt;
&lt;p&gt;三个以上&lt;kbd&gt;*&lt;/kbd&gt;,&lt;kbd&gt;-&lt;/kbd&gt;,&lt;kbd&gt;_&lt;/kbd&gt;建立分隔线，行内不能有东西，&lt;kbd&gt;*&lt;/kbd&gt;或&lt;kbd&gt;-&lt;/kbd&gt;中间可以插入空格&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;***
---
___
* * *
- - -
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;23-删除线&#34;&gt;2.3 删除线&lt;/h2&gt;
&lt;p&gt;在要添加删除线的文本两端加入两个波浪线&lt;kbd&gt;~~&lt;/kbd&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;~~删除文本~~
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;24-下划线&#34;&gt;2.4 下划线&lt;/h2&gt;
&lt;p&gt;再要添加下划线的文本两端加入两个htlm的&lt;kbd&gt;&amp;lt;u&amp;gt;&lt;/kbd&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;&amp;lt;u&amp;gt;带下划线的文本&amp;lt;u&amp;gt;
&lt;/code&gt;&lt;/pre&gt;
&lt;h2 id=&#34;25-脚注&#34;&gt;2.5 脚注&lt;/h2&gt;
&lt;p&gt;脚注为对文本的补充说明，语法格式如下:&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;脚注前的文本[^var]  

[^var]: 注明的内容
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;脚注前的文本&lt;sup class=&#34;footnote-ref&#34;&gt;&lt;a href=&#34;#fn1&#34; id=&#34;fnref1&#34;&gt;[1]&lt;/a&gt;&lt;/sup&gt;&lt;/p&gt;
&lt;h1 id=&#34;3-列表&#34;&gt;3 列表&lt;/h1&gt;
&lt;h2 id=&#34;31-无序表&#34;&gt;3.1 无序表&lt;/h2&gt;
&lt;p&gt;无序表使用&lt;kbd&gt;*&lt;/kbd&gt;,&lt;kbd&gt;+&lt;/kbd&gt;,&lt;kbd&gt;-&lt;/kbd&gt;作为列表标记，这些标记后要加一个空格：&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;* 第一项
* 第二项
* 第三项
+ 第一项
+ 第二项
+ 第三项
- 第一项
- 第二项
- 第三项
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;显示结果：&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;第一项&lt;/li&gt;
&lt;li&gt;第二项&lt;/li&gt;
&lt;li&gt;第三项&lt;/li&gt;
&lt;/ul&gt;
&lt;ul&gt;
&lt;li&gt;第一项&lt;/li&gt;
&lt;li&gt;第二项&lt;/li&gt;
&lt;li&gt;第三项&lt;/li&gt;
&lt;/ul&gt;
&lt;ul&gt;
&lt;li&gt;第一项&lt;/li&gt;
&lt;li&gt;第二项&lt;/li&gt;
&lt;li&gt;第三项&lt;/li&gt;
&lt;/ul&gt;
&lt;h2 id=&#34;32-有序表&#34;&gt;3.2 有序表&lt;/h2&gt;
&lt;p&gt;有序表使用数字并加上&lt;kbd&gt;.&lt;/kbd&gt;作为列表标记，标记后要加一个空格：&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;1. 第一项
2. 第二项
3. 第三项
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;显示结果：&lt;/p&gt;
&lt;ol&gt;
&lt;li&gt;第一项&lt;/li&gt;
&lt;li&gt;第二项&lt;/li&gt;
&lt;li&gt;第三项&lt;/li&gt;
&lt;/ol&gt;
&lt;h2 id=&#34;33-列表嵌套&#34;&gt;3.3 列表嵌套&lt;/h2&gt;
&lt;p&gt;列表嵌套只需在子列表前添加&lt;kbd&gt;Tab&lt;/kbd&gt;或者2(或4)个空格：&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;* 第一项
  * 第一项嵌套的第一个元素
  * 第一项嵌套的第二个元素
* 第二项
  * 第二项嵌套的第一个元素
    * 第二项二层嵌套的第一个元素
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;显示结果：&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;第一项
&lt;ul&gt;
&lt;li&gt;第一项嵌套的第一个元素&lt;/li&gt;
&lt;li&gt;第一项嵌套的第二个元素&lt;/li&gt;
&lt;/ul&gt;
&lt;/li&gt;
&lt;li&gt;第二项
&lt;ul&gt;
&lt;li&gt;第二项嵌套的第一个元素
&lt;ul&gt;
&lt;li&gt;第二项二层嵌套的第一个元素&lt;/li&gt;
&lt;/ul&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;h1 id=&#34;4-区块&#34;&gt;4 区块&lt;/h1&gt;
&lt;p&gt;区块的使用是在段落开头是用&lt;kbd&gt;&amp;gt;&lt;/kbd&gt;加一个空格：&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;&amp;gt; 等风来
&amp;gt; 追风去
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;显示结果：&lt;/p&gt;
&lt;blockquote&gt;
&lt;p&gt;等风来&lt;br&gt;
追风去&lt;/p&gt;
&lt;/blockquote&gt;
&lt;p&gt;区块是可以嵌套的，&lt;kbd&gt;&amp;gt;&lt;/kbd&gt;表示最外层，&lt;kbd&gt;&amp;gt;&amp;gt;&lt;/kbd&gt;表示第一层嵌套，以此类推：&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;&amp;gt; 最外层
&amp;gt;&amp;gt; 第一层嵌套
&amp;gt;&amp;gt;&amp;gt; 第二层嵌套
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;显示结果：&lt;/p&gt;
&lt;blockquote&gt;
&lt;p&gt;最外层&lt;/p&gt;
&lt;blockquote&gt;
&lt;p&gt;第一层嵌套&lt;/p&gt;
&lt;blockquote&gt;
&lt;p&gt;第二层嵌套&lt;/p&gt;
&lt;/blockquote&gt;
&lt;/blockquote&gt;
&lt;/blockquote&gt;
&lt;h2 id=&#34;41-区块中使用列表&#34;&gt;4.1 区块中使用列表&lt;/h2&gt;
&lt;p&gt;实例：&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;&amp;gt; 区块中使用列表    
&amp;gt; 1. 第一项
&amp;gt; 2. 第二项
&amp;gt;&amp;gt; * 元素一
&amp;gt;&amp;gt; * 元素二
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;显示结果：&lt;/p&gt;
&lt;blockquote&gt;
&lt;p&gt;区块中使用列表&lt;/p&gt;
&lt;ol&gt;
&lt;li&gt;第一项&lt;/li&gt;
&lt;li&gt;第二项&lt;/li&gt;
&lt;/ol&gt;
&lt;blockquote&gt;
&lt;ul&gt;
&lt;li&gt;元素一&lt;/li&gt;
&lt;li&gt;元素二&lt;/li&gt;
&lt;/ul&gt;
&lt;/blockquote&gt;
&lt;/blockquote&gt;
&lt;h2 id=&#34;列表中使用区块&#34;&gt;列表中使用区块&lt;/h2&gt;
&lt;p&gt;在列表中放入区块，需要在&lt;kbd&gt;&amp;gt;&lt;/kbd&gt;前添加四个空格缩进：&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;* 第一项
    &amp;gt; 元素一    
    &amp;gt; 元素二    
* 第二项
    &amp;gt; 元素三
    &amp;gt;&amp;gt; 元素四
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;显示结果：&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;第一项
&lt;blockquote&gt;
&lt;p&gt;元素一&lt;br&gt;
元素二&lt;/p&gt;
&lt;/blockquote&gt;
&lt;/li&gt;
&lt;li&gt;第二项
&lt;blockquote&gt;
&lt;p&gt;元素三&lt;/p&gt;
&lt;blockquote&gt;
&lt;p&gt;元素四&lt;/p&gt;
&lt;/blockquote&gt;
&lt;/blockquote&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;h1 id=&#34;5-代码&#34;&gt;5 代码&lt;/h1&gt;
&lt;h2 id=&#34;51-代码片段&#34;&gt;5.1 代码片段&lt;/h2&gt;
&lt;p&gt;如果是段落中的一个函数或片段的代码可以添加左右两个反引号(&lt;kbd&gt;`&lt;/kbd&gt;)：&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;`printf()`函数
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;显示结果：&lt;br&gt;
&lt;code&gt;print()&lt;/code&gt;函数&lt;/p&gt;
&lt;h2 id=&#34;52-代码区块&#34;&gt;5.2 代码区块&lt;/h2&gt;
&lt;ul&gt;
&lt;li&gt;
&lt;p&gt;使用&lt;strong&gt;四个空格&lt;/strong&gt;或者&lt;strong&gt;一个制表符(&lt;kbd&gt;Tab&lt;/kbd&gt;)&lt;/strong&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;  //不能指定语言
  typedef struct node
  {
      ElemType data;       //数据元素
      struct node *lchild; //指向左孩子
      struct node *rchild; //指向右孩子
  } BTNode;
&lt;/code&gt;&lt;/pre&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;使用&lt;kbd&gt;```&lt;/kbd&gt;包裹代码段，并可以指定一种语言&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-C&#34;&gt;//指定c
 typedef struct node
 {
     ElemType data;       //数据元素
     struct node *lchild; //指向左孩子
     struct node *rchild; //指向右孩子
 } BTNode;
&lt;/code&gt;&lt;/pre&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;h1 id=&#34;6-链接&#34;&gt;6 链接&lt;/h1&gt;
&lt;ul&gt;
&lt;li&gt;
&lt;p&gt;[连接名称] (链接地址)   //中间去掉空格&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;  [zd_blog](https://shmily-zd.github.io/)
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;a href=&#34;https://shmily-zd.github.io/&#34;&gt;zd_blog&lt;/a&gt;&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;&amp;lt;链接地址&amp;gt;&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;  &amp;lt;https://shmily-zd.github.io/&amp;gt;
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;a href=&#34;https://shmily-zd.github.io/&#34;&gt;https://shmily-zd.github.io/&lt;/a&gt;&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;设置变量&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;  [zd_blog][1]
  ···
  [1]: https://shmily-zd.github.io/
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;&lt;a href=&#34;https://shmily-zd.github.io/&#34;&gt;zd_blog&lt;/a&gt;&lt;/p&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;h1 id=&#34;7-图片&#34;&gt;7 图片&lt;/h1&gt;
&lt;ul&gt;
&lt;li&gt;
&lt;p&gt;插入本地图片：&lt;br&gt;
本博客采用&lt;code&gt;Gridea + github pages&lt;/code&gt;部署，本地图片会同步至GitHub库中(加载速度较慢)&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;  ![art text](https://zdblog.top/post-images/wallhaven-vgl5qp.jpg)
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;显示结果：&lt;br&gt;
&lt;img src=&#34;https://zdblog.top/post-images/1610862128990.jpg&#34; alt=&#34;&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;插入网络图片：&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;  ![art text](https://w.wallhaven.cc/full/dp/wallhaven-dpgk5o.jpg)
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;显示结果：&lt;br&gt;
&lt;img src=&#34;https://w.wallhaven.cc/full/dp/wallhaven-dpgk5o.jpg&#34; alt=&#34;moji&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;图片存入&lt;kbd&gt;.md&lt;/kbd&gt;文件&lt;br&gt;
使用base64转码工具将图片转成一段字符串(字符串过长，造成Markdown编辑器卡顿，实测Vscode)&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;  ![art text](data:img/jpg;base64,/9j/4SOVRXh...)
  
  // or
  ![art text][base64str]
  ...
  [base64str]: data:img/jpg;base64,/9j/4SOVRXh...
&lt;/code&gt;&lt;/pre&gt;
&lt;/li&gt;
&lt;li&gt;
&lt;p&gt;采取方案-图床&lt;br&gt;
综合各种插入图片方式，采取图床的方案，这里选用&lt;a href=&#34;https://sm.ms&#34;&gt;https://sm.ms&lt;/a&gt;&lt;br&gt;
上传后界面：&lt;br&gt;
&lt;img src=&#34;https://i.loli.net/2021/01/17/PupZXoI72C4fgHW.png&#34; alt=&#34;上传示例&#34; loading=&#34;lazy&#34;&gt;&lt;br&gt;
可直接复制&lt;code&gt;HTML&lt;/code&gt;或&lt;code&gt;Markdown&lt;/code&gt;&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;  // HTML
  &amp;lt;a href=&amp;quot;https://sm.ms/image/RgdkyBlwOJirVW4&amp;quot; target=&amp;quot;_blank&amp;quot;&amp;gt;&amp;lt;img src=&amp;quot;https://i.loli.net/2021/01/17/RgdkyBlwOJirVW4.jpg&amp;quot; alt=&amp;quot;wallhaven-vgl5qp.jpg&amp;quot;&amp;gt;&amp;lt;/a&amp;gt;

  // Markdown
  ![wallhaven-vgl5qp.jpg](https://i.loli.net/2021/01/17/RgdkyBlwOJirVW4.jpg)
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;显示结果：&lt;br&gt;
// HTML&lt;br&gt;
&lt;a href=&#34;https://sm.ms/image/RgdkyBlwOJirVW4&#34; target=&#34;_blank&#34;&gt;&lt;img src=&#34;https://i.loli.net/2021/01/17/RgdkyBlwOJirVW4.jpg&#34; alt=&#34;wallhaven-vgl5qp.jpg&#34;&gt;&lt;/a&gt;&lt;/p&gt;
&lt;p&gt;// Markdown&lt;br&gt;
&lt;img src=&#34;https://i.loli.net/2021/01/17/RgdkyBlwOJirVW4.jpg&#34; alt=&#34;wallhaven-vgl5qp.jpg&#34; loading=&#34;lazy&#34;&gt;&lt;/p&gt;
&lt;/li&gt;
&lt;/ul&gt;
&lt;h1 id=&#34;8-表格&#34;&gt;8 表格&lt;/h1&gt;
&lt;p&gt;Markdown制作表格使用&lt;kbd&gt;|&lt;/kbd&gt;来分隔不同的单元格，使用&lt;kbd&gt;-&lt;/kbd&gt;来分隔表头和其他行，使用&lt;kbd&gt;:-&lt;/kbd&gt;,&lt;kbd&gt;-:&lt;/kbd&gt;,&lt;kbd&gt;:-:&lt;/kbd&gt;来实现左对齐，右对齐，居中对齐：&lt;/p&gt;
&lt;pre&gt;&lt;code&gt;|表头|表头|表头|
|:-|-:|:-:|
|单元格|单元格|单元格|
|单元格|单元格|单元格|
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;显示结果：&lt;/p&gt;
&lt;table&gt;

<script>
  !function () {
    let searchMask = document.querySelector('#search_mask');
    let result = document.querySelector('#result');
    let items = document.querySelectorAll('.item');
    let searchBox = document.querySelector('#search');
    let statCount = document.querySelector('#stat_count');
    let statTimes = document.querySelector('#stat_times');
    let pageUl = document.querySelector('#page_ul');
    let close = document.querySelector('#close');
    
    close.addEventListener('click', function() {
      searchMask.style = 'display: none;'
    })

    let finds = [];
    let contents = [];
    let pageSize = 10;
    items.forEach(item => {
      let a = item.querySelector('a');
      contents.push({
        title: a.innerText,
        details: a.dataset.c,
        link: a.href
      })
      item.remove();
    })

    function insertStr(soure, start, count) {
      let newStr = soure.substr(start, count);
      return soure.slice(0, start) + '<em>' + newStr + '</em>' + soure.slice(start + count);
    }

    pageUl.addEventListener('click', function(event) {
      let target = event.target;
      if (target.__proto__ === HTMLSpanElement.prototype) {
        appendResults(parseInt(target.dataset.i));
      }
    })

    function appendResults(index) {
      let htmlResult = '';
      let start = index || 0;
      let end = Math.min(start + pageSize, finds.length);
      for (let i = start; i < end; i++) {
        const current = finds[i];
        let html = current.title;
        let sum = 0;
        let positions = current.positions;
        positions.forEach(position => {
          html = insertStr(html, position.start + sum, position.count);
          sum += 9;
        })
        htmlResult += `<div class="item"><a class="result-title" href="${current.link}">${html}</a></div>`;
      }
      result.innerHTML = htmlResult;
      pageUl.innerHTML = '';
      let count = finds.length / pageSize;
      let lis = '';
      if (start !== 0) {
        lis += `<span class="fa fa-angle-left" data-i='${start - 1}'></span>`;
      }
      for (let i = 0; i < count; i++) {
        lis += `<span class='${i === start?'current':''}' data-i='${i}'>${i+1}</span>`;     
      }
      if (start+1 < count) {
        lis += `<span class="fa fa-angle-right" data-i='${start+1}'></span>`;  
      }
      pageUl.innerHTML = lis;
    }

    function search(delay) {
      let timer = null
      return function () {
        clearTimeout(timer)
        timer = setTimeout(() => {
          let start = Date.now();
          let segments = searchBox.value.split(' ').filter(c => c != '');
          if (segments.length <= 0) {
            return;
          }
          finds = [];
          let htmlResult = '';
          contents.forEach(content => {
            let title = content.title;
            let positions = [];
            let find = false;
            segments.forEach((segment) => {
              if (content.title.includes(segment)) {
                find = true;
                positions.push({
                  start: content.title.indexOf(segment),
                  count: segment.length
                })
              } else if (content.details.includes(segment)) {
                find = true;
              }
            });
            if (find) {
              finds.push({
                title: content.title,
                link: content.link,
                positions
              });
            }
          })
          appendResults(0);
          statCount.textContent = finds.length;
          statTimes.textContent = Date.now() - start;
        }, delay)
      }
    }
    searchBox.addEventListener('input', search(200));
  }()
</script>

  //拿来主义(真香)^_^，Clipboard 实现摘自掘金 https://juejin.im/post/5aefeb6e6fb9a07aa43c20af
  window.Clipboard = (function (window, document, navigator) {
    var textArea,
      copy;

    // 判断是不是ios端
    function isOS() {
      return navigator.userAgent.match(/ipad|iphone/i);
    }
    //创建文本元素
    function createTextArea(text) {
      textArea = document.createElement('textArea');
      textArea.value = text;
      textArea.style.width = 0;
      textArea.style.height = 0;
      textArea.clientHeight = 0;
      textArea.clientWidth = 0;
      document.body.appendChild(textArea);
    }
    //选择内容
    function selectText() {
      var range,
        selection;

      if (isOS()) {
        range = document.createRange();
        range.selectNodeContents(textArea);
        selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        textArea.setSelectionRange(0, 999999);
      } else {
        textArea.select();
      }
    }

    //复制到剪贴板
    function copyToClipboard() {
      try {
        document.execCommand("Copy")
      } catch (err) {
        alert("复制错误！请手动复制！")
      }
      document.body.removeChild(textArea);
    }

    copy = function (text) {
      createTextArea(text);
      selectText();
      copyToClipboard();
    };

    return {
      copy: copy
    };
  })(window, document, navigator);

  function copyCode(e) {
    if (e.srcElement.tagName === 'SPAN' && e.srcElement.classList.contains('copy-code')) {
      let code = e.currentTarget.querySelector('code');
      var text = code.innerText;
      if (e.srcElement.textContent === '复制成功') {
        return;
      }
      e.srcElement.textContent = '复制成功';
      (function (elem) {
        setTimeout(() => {
          if (elem.textContent === '复制成功') {
            elem.textContent = '复制代码'
          }
        }, 1000);
      })(e.srcElement)
      Clipboard.copy(text);
    }
  }

  let pres = document.querySelectorAll('pre');
  pres.forEach(pre => {
    let code = pre.querySelector('code');

    copyElem.classList.add('copy-code');
    copyElem.textContent = '复制代码';
    pre.appendChild(copyElem);
    pre.onclick = copyCode
  })

</script>
